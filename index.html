<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: system-ui, -apple-system, sans-serif;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body class="text-gray-200 flex flex-col justify-between h-full p-4 selection:bg-purple-500/30">

    <div id="youtubePlayerContainer" style="position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none;">
        <div id="ytPlayer"></div>
    </div>

    <div class="w-full max-w-md mx-auto pt-2">
        <div class="relative flex items-center bg-zinc-900 rounded-full border border-zinc-800 focus-within:border-purple-500 transition-all px-4 py-2.5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-zinc-500 mr-3"></i>
            <input type="text" id="searchInput" placeholder="Cerca beat... (es. free rnb)" 
                   class="w-full bg-transparent outline-none text-sm placeholder-zinc-500 text-white pr-2">
            <button id="searchBtn" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold px-4 py-1.5 rounded-full transition-colors shrink-0">
                Cerca
            </button>
        </div>
    </div>

    <div class="flex-1 w-full max-w-md mx-auto my-4 overflow-hidden flex flex-col justify-center items-center relative">
        <div id="resultsContainer" class="w-full h-full overflow-y-auto space-y-2 hidden pr-1"></div>

        <div id="playerView" class="flex flex-col items-center text-center w-full px-4">
            <div class="w-60 h-60 md:w-64 md:h-64 rounded-2xl overflow-hidden shadow-2xl shadow-purple-900/20 border border-zinc-800 bg-zinc-900 flex items-center justify-center mb-6">
                <img id="trackArt" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400" alt="Cover" class="w-full h-full object-cover">
            </div>
            <h2 id="trackTitle" class="text-lg font-bold text-white truncate w-full max-w-xs mb-1">Nessuna traccia</h2>
            <p id="trackArtist" class="text-sm text-zinc-400 truncate w-full max-w-xs">Cerca un brano per iniziare</p>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto pb-4 bg-zinc-950/40 backdrop-blur-md rounded-3xl p-4 border border-zinc-900/80 shadow-2xl">
        <div class="w-full flex items-center justify-between text-[10px] text-zinc-500 mb-2 px-1 font-mono">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
        <div id="progressContainer" class="w-full h-1.5 bg-zinc-800 rounded-full mb-5 cursor-pointer relative">
            <div id="progressBar" class="h-full bg-gradient-to-r from-purple-600 to-pink-500 rounded-full w-0"></div>
        </div>

        <div class="flex items-center justify-center gap-6">
            <button id="prevBtn" class="text-zinc-400 hover:text-white text-lg p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="backwardBtn" class="text-zinc-500 hover:text-white text-sm p-2"><i class="fa-solid fa-backward text-xs mr-0.5"></i>10s</button>
            
            <button id="playBtn" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-xl transition-all">
                <i id="playIcon" class="fa-solid fa-play ml-0.5"></i>
            </button>
            
            <button id="forwardBtn" class="text-zinc-500 hover:text-white text-sm p-2">10s<i class="fa-solid fa-forward text-xs ml-0.5"></i></button>
            <button id="nextBtn" class="text-zinc-400 hover:text-white text-lg p-2"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const playerView = document.getElementById('playerView');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        
        let player;
        let appState = { tracks: [], currentIndex: -1, isPlaying: false };

        // Inizializza il lettore ufficiale di YouTube
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '100',
                width: '100',
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onReady': () => { console.log("Player YouTube pronto."); }
                }
            });
        }

        // Sistema di ricerca aperta tramite scomposizione feed alternativo senza CORS
        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            searchBtn.disabled = true;
            searchBtn.innerText = "...";
            resultsContainer.innerHTML = `<div class="text-center text-zinc-500 text-sm py-8"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Connessione a YouTube...</div>`;
            resultsContainer.classList.remove('hidden');
            playerView.classList.add('hidden');

            try {
                // Utilizza un server pubblico unificato di fallback unicamente per l'indice testuale dei video
                const res = await fetch(`https://invidious.projectsegfau.lt/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                if (!res.ok) throw new Error();
                const items = await res.json();

                if (!items || items.length === 0) {
                    resultsContainer.innerHTML = `<div class="text-center text-zinc-500 text-sm py-8">Nessun beat trovato.</div>`;
                    return;
                }

                appState.tracks = items.slice(0, 15).map(item => ({
                    id: item.videoId,
                    title: item.title,
                    artist: item.author,
                    thumbnail: `https://img.youtube.com/vi/${item.videoId}/mqdefault.jpg`
                }));

                renderResults();
            } catch (err) {
                // Secondo tentativo istantaneo su nodo specchio se il primo fallisce
                try {
                    const res = await fetch(`https://iv.melmac.space/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                    const items = await res.json();
                    appState.tracks = items.slice(0, 15).map(item => ({
                        id: item.videoId,
                        title: item.title,
                        artist: item.author,
                        thumbnail: `https://img.youtube.com/vi/${item.videoId}/mqdefault.jpg`
                    }));
                    renderResults();
                } catch(e) {
                    resultsContainer.innerHTML = `<div class="text-center text-red-400 text-sm py-8">I nodi di ricerca sono sovraccarichi. Riprova tra un attimo.</div>`;
                }
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerText = "Cerca";
            }
        }

        function renderResults() {
            resultsContainer.innerHTML = "";
            appState.tracks.forEach((track, idx) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-3 bg-zinc-900/60 hover:bg-zinc-800/80 p-2.5 rounded-xl cursor-pointer transition-all";
                row.innerHTML = `
                    <img src="${track.thumbnail}" class="w-12 h-12 object-cover rounded-lg shrink-0 bg-zinc-800">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-white truncate">${track.title}</p>
                        <p class="text-xs text-zinc-400 truncate">${track.artist}</p>
                    </div>
                `;
                row.onclick = () => selectTrack(idx);
                resultsContainer.appendChild(row);
            });
        }

        function selectTrack(index) {
            appState.currentIndex = index;
            const track = appState.tracks[index];

            document.getElementById('trackTitle').innerText = track.title;
            document.getElementById('trackArtist').innerText = track.artist;
            document.getElementById('trackArt').src = track.thumbnail;
            
            resultsContainer.classList.add('hidden');
            playerView.classList.remove('hidden');

            if (player && player.loadVideoById) {
                playIcon.className = "fa-solid fa-circle-notch animate-spin ml-0";
                player.loadVideoById(track.id);
                appState.isPlaying = true;
                updatePlayButton();
            }
        }

        function onPlayerStateChange(event) {
            // YT.PlayerState.PLAYING = 1, PAUSED = 2, ENDED = 0
            if (event.data === 1) {
                appState.isPlaying = true;
                updatePlayButton();
                startProgressLoop();
            } else if (event.data === 2) {
                appState.isPlaying = false;
                updatePlayButton();
            } else if (event.data === 0) {
                nextTrack();
            }
        }

        function togglePlay() {
            if (appState.currentIndex === -1 || !player) return;
            if (appState.isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function updatePlayButton() {
            playIcon.className = appState.isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play ml-0.5";
        }

        let progressInterval;
        function startProgressLoop() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && player.getCurrentTime && appState.isPlaying) {
                    const current = player.getCurrentTime();
                    const duration = player.getDuration();
                    if (duration > 0) {
                        progressBar.style.width = `${(current / duration) * 100}%`;
                        document.getElementById('currentTime').innerText = formatTime(current);
                        document.getElementById('durationTime').innerText = formatTime(duration);
                    }
                }
            }, 500);
        }

        progressContainer.addEventListener('click', (e) => {
            if (!player || !player.getDuration) return;
            const rect = progressContainer.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const targetTime = pct * player.getDuration();
            player.seekTo(targetTime, true);
        });

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            selectTrack((appState.currentIndex + 1) % appState.tracks.length);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let p = appState.currentIndex - 1;
            selectTrack(p < 0 ? appState.tracks.length - 1 : p);
        }

        function formatTime(s) {
            if (isNaN(s) || s < 0) return "0:00";
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        document.getElementById('forwardBtn').addEventListener('click', () => { if(player) player.seekTo(player.getCurrentTime() + 10, true); });
        document.getElementById('backwardBtn').addEventListener('click', () => { if(player) player.seekTo(player.getCurrentTime() - 10, true); });
    </script>
</body>
</html>
