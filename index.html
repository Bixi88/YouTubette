<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Premium Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#040406" id="metaThemeColor">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #050508;
            --bg-card: rgba(20, 20, 28, 0.6);
            --bg-input: rgba(255, 255, 255, 0.08);
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --glow-color: rgba(29, 185, 84, 0.15);
        }

        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Gradienti sfocati dinamici sullo sfondo (Stile iOS) */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% -20%, #12121a, #050508 80%);
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--accent);
            filter: blur(140px);
            opacity: 0.12;
            mix-blend-mode: screen;
            transition: background 1s ease, transform 10s ease-in-out;
            animation: floatBlobs 20s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes floatBlobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -60px) scale(1.1); }
            100% { transform: translate(-20px, 40px) scale(0.9); }
        }

        /* Glassmorphism */
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Custom scrollbar iOS style */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        /* Waveform Animation estetica */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 30px;
        }
        .wave-bar {
            width: 3px;
            height: 100%;
            background-color: var(--accent);
            border-radius: 10px;
            animation: bounce 1.2s ease-in-out infinite alternate;
            transform-origin: bottom;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 60%; }
        .wave-bar:nth-child(3) { animation-delay: 0.3s; height: 80%; }
        .wave-bar:nth-child(4) { animation-delay: 0.2s; height: 40%; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 70%; }
        
        @keyframes bounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1.1); }
        }

        /* Slider progressivo sottile ed elegante */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
        }

        /* Area testi interattiva con effetto trascinamento (Swipe) */
        #interactiveLyricsContainer {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            touch-action: pan-y;
        }
        #interactiveLyricsContainer.dragging {
            transition: none !important;
        }
    </style>
</head>
<body class="flex flex-col justify-between hidden p-4 box-border h-full">

    <div class="ambient-bg">
        <div class="blob blob-1" id="blob1"></div>
        <div class="blob blob-2" id="blob2"></div>
    </div>

    <header class="h-16 px-4 flex items-center justify-between rounded-3xl mb-3 shrink-0 z-50 glass-panel">
        <div class="flex items-center space-x-2 text-xl font-bold tracking-tight shrink-0">
            <i class="fa-solid fa-compact-disc animate-spin-slow text-[var(--accent)]"></i>
            <span class="hidden sm:inline font-bold text-white">YouTubette</span>
        </div>
        
        <div class="flex-1 max-w-md mx-4 relative">
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca canzoni, artisti, beat..." 
                    class="w-full text-sm pl-11 pr-24 py-2.5 rounded-full border border-transparent focus:outline-none focus:border-neutral-500 transition-all bg-[var(--bg-input)] text-[var(--text-main)]">
                
                <div class="absolute right-1.5 flex items-center space-x-1">
                    <button id="filterToggleBtn" class="text-gray-400 hover:text-white p-1.5 text-sm">
                        <i class="fa-solid fa-sliders"></i>
                    </button>
                    <button id="searchBtn" class="font-bold text-xs px-4 py-2 rounded-full active:scale-95 transition-transform bg-white text-black">
                        Cerca
                    </button>
                </div>
            </div>

            <div id="filterMenu" class="hidden absolute top-full left-0 right-0 mt-2 border rounded-2xl p-4 shadow-2xl z-50 space-y-3 glass-panel border-neutral-800">
                <p class="text-xs font-bold uppercase tracking-wider mb-1 text-[var(--text-muted)]">Filtri di Ricerca</p>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[10px] mb-1 text-[var(--text-muted)]">Ordina</label>
                        <select id="filterOrder" class="w-full text-xs p-2 rounded-xl bg-[var(--bg-input)] text-white border-0">
                            <option value="relevance">Rilevanza</option>
                            <option value="date" selected>Data</option>
                            <option value="viewCount">Visualizzazioni</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] mb-1 text-[var(--text-muted)]">Durata</label>
                        <select id="filterDuration" class="w-full text-xs p-2 rounded-xl bg-[var(--bg-input)] text-white border-0">
                            <option value="any" selected>Qualsiasi</option>
                            <option value="short">Breve (&lt; 4 min)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="shrink-0 flex items-center space-x-1">
            <button id="pwaInstallBtn" class="hidden text-black font-bold text-xs px-3 py-1.5 rounded-full bg-[var(--accent)]">
                <i class="fa-solid fa-download"></i> Installa
            </button>
            <button id="apiConfigBtn" class="text-gray-400 hover:text-white p-2 rounded-full w-9 h-9 flex items-center justify-center bg-[var(--bg-input)]">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden gap-4 mb-3">
        <section class="flex-1 md:w-[60%] p-5 flex flex-col rounded-3xl overflow-hidden h-full glass-panel">
            <h2 class="text-lg font-bold mb-3 flex items-center justify-between">
                <span>Brani in Coda</span>
                <i class="fa-solid fa-list-ul text-sm text-[var(--text-muted)]"></i>
            </h2>
            <div class="overflow-y-auto flex-1 pr-1" id="trackList">
                <p id="placeholderText" class="text-xs p-4 italic text-center mt-6 text-[var(--text-muted)]">Cerca qualcosa per riempire la playlist.</p>
            </div>
        </section>

        <section id="videoSection" class="flex flex-col md:w-[40%] rounded-3xl overflow-hidden glass-panel relative p-5 justify-between">
            
            <div class="relative w-full aspect-video md:aspect-square rounded-2xl overflow-hidden bg-neutral-950 flex items-center justify-center shadow-lg">
                <div id="ytPlayerContainer" class="w-full h-full absolute inset-0 opacity-0 pointer-events-none"></div>
                
                <div id="coverFallback" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 bg-gradient-to-b from-neutral-900 to-black">
                    <div class="w-24 h-24 rounded-full bg-[var(--accent)] flex items-center justify-center shadow-2xl mb-4 animate-pulse" style="box-shadow: 0 10px 40px var(--glow-color)">
                        <i class="fa-solid fa-music text-white text-3xl"></i>
                    </div>
                    <p class="text-sm font-bold truncate max-w-full" id="currentDisplayTitle">Seleziona un brano</p>
                    <p class="text-xs text-[var(--text-muted)] mt-1" id="currentDisplayArtist"></p>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center items-center py-4 relative overflow-hidden">
                <div id="interactiveLyricsContainer" class="w-full text-center cursor-grab active:cursor-grabbing">
                    <p class="text-xs uppercase tracking-wider text-[var(--accent)] font-bold mb-1">Ora in Riproduzione</p>
                    <h3 id="lyricTitle" class="text-xl font-bold px-4 line-clamp-1">Nessun brano</h3>
                    <p id="lyricSubtitle" class="text-sm text-[var(--text-muted)] mt-1 px-4 line-clamp-1">Trascina questa card a destra o sinistra per cambiare canzone</p>
                    
                    <div class="flex items-center justify-center gap-1.5 mt-4 opacity-50" id="waveform">
                        <div class="wave-bar h-6"></div>
                        <div class="wave-bar h-8"></div>
                        <div class="wave-bar h-4"></div>
                        <div class="wave-bar h-10"></div>
                        <div class="wave-bar h-5"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footerControls" class="rounded-3xl p-4 flex flex-col items-center shrink-0 z-40 select-none glass-panel relative">
        
        <div class="w-full flex items-center space-x-3 text-xs mb-3 max-w-3xl text-[var(--text-muted)]">
            <span id="currentTime" class="w-10 text-left">0:00</span>
            <div class="flex-1 h-3 rounded-full relative cursor-pointer py-1" id="progressBarContainer">
                <div class="w-full h-1 rounded-full bg-neutral-800"></div>
                <div class="h-1 rounded-full w-0 absolute top-1 left-0 bg-[var(--accent)]" id="progressBar"></div>
            </div>
            <span id="durationTime" class="w-10 text-right">0:00</span>
        </div>

        <div class="flex items-center justify-between w-full max-w-3xl px-4">
            
            <div class="hidden md:flex items-center space-x-2 w-1/4 justify-start text-[var(--text-muted)]">
                <i class="fa-solid fa-volume-high text-xs"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" class="w-20 h-1 accent-white">
            </div>
            
            <div class="flex items-center justify-center space-x-6 w-full md:w-2/4">
                <button id="prevBtn" class="text-gray-400 hover:text-white transition-colors text-lg p-2 active:scale-90"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playPauseBtn" class="w-12 h-12 rounded-full flex items-center justify-center bg-white text-black hover:scale-105 active:scale-95 transition-transform shadow-lg">
                    <i class="fa-solid fa-play text-lg" id="playIcon"></i>
                </button>
                <button id="nextBtn" class="text-gray-400 hover:text-white transition-colors text-lg p-2 active:scale-90"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            
            <div class="flex items-center w-1/4 justify-end space-x-3">
                <button id="downloadBtn" class="text-gray-400 hover:text-white transition-colors text-lg p-2 opacity-50 cursor-not-allowed" disabled>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </div>
    </footer>

    <div id="apiModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="border w-full max-w-md rounded-3xl p-6 shadow-2xl glass-panel border-neutral-800">
            <h3 class="text-lg font-bold mb-5 flex items-center">
                <i class="fa-solid fa-gear mr-2 text-[var(--accent)]"></i> Impostazioni
            </h3>
            
            <div class="mb-5">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 text-[var(--text-muted)]">YouTube API Key</label>
                <input type="text" id="modalApiKeyInput" placeholder="Incolla qui la chiave API..." 
                    class="w-full text-sm px-4 py-3 rounded-full bg-[var(--bg-input)] border-0 text-white focus:outline-none">
            </div>

            <div class="mb-5">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 text-[var(--text-muted)]">Accent Color (Tema)</label>
                <select id="modalThemeSelect" class="w-full text-sm px-4 py-3 rounded-xl bg-[var(--bg-input)] text-white border-0 focus:outline-none">
                </select>
            </div>

            <div class="flex items-center justify-end space-x-3">
                <button id="modalCancelBtn" class="font-semibold text-xs px-4 py-2 text-[var(--text-muted)]">Annulla</button>
                <button id="modalSaveBtn" class="font-bold text-xs px-6 py-2.5 rounded-full bg-white text-black active:scale-95 transition-all">Salva</button>
            </div>
        </div>
    </div>

    <script>
        const themes = {
            spotifyGreen: { name: "Neon Green", accent: "#1DB954", glow: "rgba(29, 185, 84, 0.2)" },
            cyberPurple:  { name: "Cyber Purple", accent: "#bf5af2", glow: "rgba(191, 90, 242, 0.2)" },
            deepBlue:     { name: "Oceanic Depth", accent: "#0a84ff", glow: "rgba(10, 132, 255, 0.2)" },
            synthWave:    { name: "Synth Magenta", accent: "#ff375f", glow: "rgba(255, 55, 95, 0.2)" },
            amberGold:    { name: "Amber Gold", accent: "#ff9f0a", glow: "rgba(255, 159, 10, 0.2)" }
        };

        let appState = {
            apiKey: localStorage.getItem('youtubette_api_key') || '',
            currentTheme: localStorage.getItem('youtubette_theme') || 'spotifyGreen',
            tracks: [],
            currentIndex: -1,
            isPlaying: false
        };

        let deferredPrompt;
        let startX = 0, currentX = 0, isDragging = false;
        let isScrubbing = false; 
        let scrubPercentage = 0;
        
        const interactiveLyrics = document.getElementById('interactiveLyricsContainer');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((reg) => {
                    setInterval(() => reg.update(), 60 * 60 * 1000);
                }).catch(err => console.log(err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('pwaInstallBtn')?.classList.remove('hidden');
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(document.getElementById('volumeSlider')?.value || 100);
            startProgressLoop();
            setupMediaSessionHandlers();
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon');
            const wave = document.getElementById('waveform');
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                if(playIcon) playIcon.className = "fa-solid fa-pause text-lg";
                if(wave) wave.classList.remove('opacity-50');
                updateDuration(); updateMediaSessionState(true);
            } else {
                appState.isPlaying = false;
                if(playIcon) playIcon.className = "fa-solid fa-play text-lg";
                if(wave) wave.classList.add('opacity-50');
                updateMediaSessionState(false);
                if (event.data == YT.PlayerState.ENDED) {
                    nextTrack();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(appState.currentTheme);
            populateThemeSelect();

            document.body.classList.remove('hidden');
            
            document.getElementById('searchBtn').addEventListener('click', () => performSearch());
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
            
            document.getElementById('filterToggleBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('filterMenu').classList.toggle('hidden');
            });

            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('nextBtn').addEventListener('click', nextTrack);
            document.getElementById('downloadBtn').addEventListener('click', redirectToDownload);
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => player?.setVolume(e.target.value));
            
            // Scrubbing Progress bar
            progressBarContainer.addEventListener('mousedown', startScrub);
            progressBarContainer.addEventListener('touchstart', startScrub, { passive: false });
            window.addEventListener('mousemove', moveScrub);
            window.addEventListener('touchmove', moveScrub, { passive: false });
            window.addEventListener('mouseup', endScrub);
            window.addEventListener('touchend', endScrub);

            // Settings modal
            document.getElementById('apiConfigBtn').addEventListener('click', openApiModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeApiModal);
            document.getElementById('modalSaveBtn').addEventListener('click', saveSettingsFromModal);

            // Gestione dei gesti di Swipe su area testi / player
            interactiveLyrics.addEventListener('touchstart', dragStart, { passive: true });
            interactiveLyrics.addEventListener('touchmove', dragMove, { passive: false });
            interactiveLyrics.addEventListener('touchend', dragEnd, { passive: true });
            interactiveLyrics.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);
        });

        function populateThemeSelect() {
            const select = document.getElementById('modalThemeSelect');
            if (!select) return;
            select.innerHTML = '';
            for (const [key, theme] of Object.entries(themes)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = theme.name;
                if (key === appState.currentTheme) option.selected = true;
                select.appendChild(option);
            }
        }

        function applyTheme(themeKey) {
            const theme = themes[themeKey] || themes.spotifyGreen;
            const root = document.documentElement;
            root.style.setProperty('--accent', theme.accent);
            root.style.setProperty('--glow-color', theme.glow);
            appState.currentTheme = themeKey;

            // Aggiorna visivamente gli elementi ambientali
            const b1 = document.getElementById('blob1');
            const b2 = document.getElementById('blob2');
            if(b1) b1.style.background = theme.accent;
            if(b2) b2.style.background = theme.accent;
        }

        function openApiModal() {
            const modal = document.getElementById('apiModal');
            const input = document.getElementById('modalApiKeyInput');
            if (modal && input) {
                input.value = appState.apiKey;
                modal.classList.remove('hidden');
            }
        }

        function closeApiModal() {
            document.getElementById('apiModal').classList.add('hidden');
        }

        function saveSettingsFromModal() {
            const key = document.getElementById('modalApiKeyInput').value.trim();
            const selectedTheme = document.getElementById('modalThemeSelect').value;
            appState.apiKey = key;
            localStorage.setItem('youtubette_api_key', key);
            localStorage.setItem('youtubette_theme', selectedTheme);
            applyTheme(selectedTheme);
            closeApiModal();
        }

        // --- GESTIONE SWIPE PREMIUM ---
        function getClientX(e) {
            return e.touches ? e.touches[0].clientX : e.clientX;
        }

        function dragStart(e) {
            isDragging = true;
            startX = getClientX(e);
            interactiveLyrics.classList.add('dragging');
        }

        function dragMove(e) {
            if (!isDragging) return;
            currentX = getClientX(e) - startX;
            
            // Calcola opacità e traslazione
            const opacity = Math.max(0.3, 1 - Math.abs(currentX) / 250);
            interactiveLyrics.style.transform = `translate3d(${currentX}px, 0, 0) rotate(${currentX * 0.03}deg)`;
            interactiveLyrics.style.opacity = opacity;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            interactiveLyrics.classList.remove('dragging');

            const threshold = 100; // Distanza minima per far scattare lo swipe
            if (currentX > threshold) {
                // Swipe a destra -> Canzone Precedente
                animateAndExecute('right', prevTrack);
            } else if (currentX < -threshold) {
                // Swipe a sinistra -> Canzone Successiva
                animateAndExecute('left', nextTrack);
            } else {
                // Ritorna al centro
                interactiveLyrics.style.transform = 'translate3d(0, 0, 0)';
                interactiveLyrics.style.opacity = '1';
            }
            currentX = 0;
        }

        function animateAndExecute(direction, action) {
            interactiveLyrics.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
            interactiveLyrics.style.transform = `translate3d(${direction === 'right' ? '120%' : '-120%'}, 0, 0)`;
            interactiveLyrics.style.opacity = '0';
            
            setTimeout(() => {
                action();
                interactiveLyrics.style.transition = 'none';
                interactiveLyrics.style.transform = `translate3d(${direction === 'right' ? '-120%' : '120%'}, 0, 0)`;
                interactiveLyrics.offsetHeight; // trigger reflow
                interactiveLyrics.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s';
                interactiveLyrics.style.transform = 'translate3d(0, 0, 0)';
                interactiveLyrics.style.opacity = '1';
            }, 250);
        }

        // --- RICERCA E DATI API ---
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            if (!appState.apiKey) { openApiModal(); return; }

            const placeholderText = document.getElementById('placeholderText');
            if (placeholderText) placeholderText.innerText = "Ricerca in corso...";
            
            const order = document.getElementById('filterOrder').value;

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&order=${order}&key=${appState.apiKey}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                appState.tracks = data.items.map(item => ({
                    id: item.id.videoId, 
                    title: item.snippet.title, 
                    channel: item.snippet.channelTitle, 
                    thumbnail: item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.default.url
                }));
                
                renderTracklist();
                if (appState.tracks.length > 0) loadTrack(0);
            } catch (error) {
                alert(error.message);
                if (placeholderText) placeholderText.innerText = "Errore durante la ricerca.";
            }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; 
            trackListDiv.innerHTML = '';
            
            appState.tracks.forEach((track, index) => {
                const selected = appState.currentIndex === index;
                const trackRow = document.createElement('div');
                trackRow.className = `flex items-center p-3 rounded-2xl cursor-pointer transition-all mb-2 ${selected ? 'bg-[rgba(255,255,255,0.1)] border border-[rgba(255,255,255,0.1)] shadow-md' : 'hover:bg-[rgba(255,255,255,0.04)]'}`;
                trackRow.innerHTML = `
                    <img src="${track.thumbnail}" class="w-11 h-11 object-cover rounded-full border border-neutral-800 shadow">
                    <div class="flex-1 overflow-hidden ml-3">
                        <p class="text-xs font-bold truncate ${selected ? 'text-[var(--accent)]' : 'text-white'}">${track.title}</p>
                        <p class="text-[10px] text-[var(--text-muted)] truncate mt-0.5">${track.channel}</p>
                    </div>
                    <div class="flex items-center space-x-2 text-[var(--text-muted)]">
                        <button class="hover:text-red-500 transition-colors p-1"><i class="fa-regular fa-heart"></i></button>
                        <button class="hover:text-white transition-colors p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                `;
                trackRow.addEventListener('click', () => loadTrack(index));
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            appState.currentIndex = index;
            const track = appState.tracks[index];

            // Aggiorna l'interfaccia principale e il player
            document.getElementById('currentDisplayTitle').innerText = track.title;
            document.getElementById('currentDisplayArtist').innerText = track.channel;
            document.getElementById('lyricTitle').innerText = track.title;
            document.getElementById('lyricSubtitle').innerText = track.channel;

            const fallback = document.getElementById('coverFallback');
            if (fallback) {
                fallback.style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.4), #000), url(${track.thumbnail})`;
                fallback.style.backgroundSize = 'cover';
                fallback.style.backgroundPosition = 'center';
            }

            if (player?.loadVideoById) {
                player.loadVideoById(track.id);
            }

            renderTracklist();
            toggleDownloadButtons(true);
            updateMediaSessionMetadata(track);
        }

        // --- UTILITY E AUDIO CONTROLS ---
        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let nextIdx = (appState.currentIndex + 1) % appState.tracks.length;
            loadTrack(nextIdx);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let prevIdx = appState.currentIndex - 1;
            if (prevIdx < 0) prevIdx = appState.tracks.length - 1;
            loadTrack(prevIdx);
        }

        function startProgressLoop() {
            setInterval(() => {
                if (player?.getCurrentTime && appState.isPlaying && !isScrubbing) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        progressBar.style.width = `${(currentTime / duration) * 100}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                    }
                }
            }, 500);
        }

        function updateDuration() {
            if (player?.getDuration) document.getElementById('durationTime').innerText = formatTime(player.getDuration());
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function toggleDownloadButtons(enabled) {
            const btn = document.getElementById('downloadBtn');
            if(btn) {
                btn.disabled = !enabled;
                btn.className = enabled ? "text-[var(--accent)] cursor-pointer text-lg p-2" : "text-gray-400 opacity-50 cursor-not-allowed text-lg p-2";
            }
        }

        function redirectToDownload() {
            if (appState.currentIndex === -1) return;
            const currentTrack = appState.tracks[appState.currentIndex];
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrack.id}`;
            navigator.clipboard.writeText(youtubeUrl).then(() => {
                window.open(`https://kleger.pl/`, '_blank');
            });
        }

        // --- SCRUBBING ---
        function updateScrubPosition(e) {
            const rect = progressBarContainer.getBoundingClientRect();
            const clientX = getClientX(e);
            let offsetX = clientX - rect.left;
            offsetX = Math.max(0, Math.min(offsetX, rect.width));
            scrubPercentage = offsetX / rect.width;
            progressBar.style.width = `${scrubPercentage * 100}%`;
            
            const duration = player.getDuration() || 0;
            document.getElementById('currentTime').innerText = formatTime(duration * scrubPercentage);
        }

        function startScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            updateScrubPosition(e);
        }

        function moveScrub(e) {
            if (!isScrubbing) return;
            if (e.cancelable) e.preventDefault();
            updateScrubPosition(e);
        }

        function endScrub() {
            if (!isScrubbing) return;
            isScrubbing = false;
            const duration = player.getDuration() || 0;
            player.seekTo(duration * scrubPercentage, true);
        }

        function updateMediaSessionMetadata(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.channel, album: 'YouTubette Premium',
                    artwork: [{ src: track.thumbnail, sizes: '512x512', type: 'image/jpeg' }]
                });
            }
        }

        function updateMediaSessionState(isPlaying) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
        }

        function setupMediaSessionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }
    </script>
</body>
</html>
