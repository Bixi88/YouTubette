<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Live Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #121212;
        }
        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }
        .animate-marquee {
            animation: marqueeLoop 15s linear infinite;
        }
        @keyframes marqueeLoop {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }
        #swipeTitleContainer {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            touch-action: pan-y;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col justify-between hidden bg-[#121212]">

    <header class="h-16 bg-black px-3 flex items-center justify-between border-b border-[#282828] shrink-0 z-50">
        <div class="flex items-center space-x-1.5 text-[#1DB954] text-xl font-bold tracking-tight shrink-0">
            <i class="fa-solid fa-radio"></i>
            <span class="hidden sm:inline text-white font-bold ml-1">YouTubette</span>
        </div>
        
        <div class="flex-1 max-w-md mx-2 relative">
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca beat o sample live..." 
                    class="w-full bg-[#242424] text-sm text-white pl-10 pr-20 py-2 rounded-full border border-transparent focus:outline-none focus:border-white focus:bg-[#2a2a2a] transition-all">
                
                <div class="absolute right-1.5 flex items-center">
                    <button id="searchBtn" class="bg-[#1DB954] text-black font-semibold text-xs px-4 py-1.5 rounded-full active:scale-95 transition-transform">
                        Cerca
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col-reverse md:flex-row overflow-hidden bg-[#121212]">
        <section class="flex-1 md:w-3/5 bg-black p-3 flex flex-col border-t md:border-t-0 md:border-r border-[#282828] overflow-y-auto h-full">
            <h2 class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-2 px-1">Risultati in tempo reale</h2>
            <div id="trackList" class="space-y-1 pb-4">
                <p id="placeholderText" class="text-gray-500 text-xs p-4 italic text-center mt-6">Cerca qualsiasi cosa. Troverai sempre gli ultimi sample caricati online.</p>
            </div>
        </section>

        <section class="flex flex-col bg-black md:w-2/5 h-44 md:h-full relative shrink-0 md:shrink border-b border-[#282828]">
            <div class="w-full flex-1 bg-black flex items-center justify-center overflow-hidden relative">
                <div id="ytPlayerContainer" class="w-full h-full absolute inset-0"></div>
                <div id="coverFallback" class="absolute inset-0 flex flex-col items-center justify-center bg-[#181818] text-gray-500 pointer-events-none z-10">
                    <i class="fa-solid fa-music text-2xl mb-1"></i>
                    <p class="text-xs font-medium px-4 text-center">Scegli una traccia</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="footerControls" class="bg-[#181818] border-t border-[#282828] px-4 pt-4 pb-6 flex flex-col items-center shrink-0 z-50 select-none relative">
        <div id="swipeTitleContainer" class="w-full text-center py-2 mb-2 bg-transparent select-none">
            <div class="marquee-wrapper mx-auto max-w-xl pointer-events-none">
                <div id="marqueeContent" class="marquee-content">
                    <span id="playerTrackTitle" class="text-sm font-bold text-white">Pronto all'ascolto</span>
                    <span id="playerTrackChannel" class="text-xs text-gray-400 ml-2 font-normal">-</span>
                </div>
            </div>
        </div>

        <div class="w-full flex items-center space-x-3 text-xs text-gray-400 mb-4 max-w-2xl relative">
            <span id="currentTime" class="w-9 text-left">0:00</span>
            <div class="flex-1 bg-[#4d4d4d] h-2 rounded-full relative overflow-hidden">
                <div class="bg-[#1DB954] h-full w-0 transition-all duration-300" id="progressBar"></div>
            </div>
            <span id="durationTime" class="w-9 text-right">0:00</span>
        </div>

        <div class="flex items-center justify-center space-x-6 w-full">
            <button id="prevBtn" class="text-gray-400 text-xl p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="playPauseBtn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">
                <i class="fa-solid fa-play" id="playIcon"></i>
            </button>
            <button id="nextBtn" class="text-gray-400 text-xl p-2"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </footer>

    <script>
        // Lista di istanze Invidious pubbliche e stabili. Se una fallisce, l'app passa all'altra all'istante.
        const INVIDIOUS_INSTANCES = [
            "https://invidious.flokinet.to",
            "https://vid.puffyan.us",
            "https://invidious.projectsegfau.lt",
            "https://inv.tux.digital",
            "https://yewtu.be"
        ];
        
        let currentInstanceIndex = 0;
        let appState = { tracks: [], currentIndex: -1, isPlaying: false };
        let player;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon');
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                playIcon.className = "fa-solid fa-pause";
                document.getElementById('coverFallback').style.display = "none";
                if(player.getDuration) document.getElementById('durationTime').innerText = formatTime(player.getDuration());
            } else {
                appState.isPlaying = false;
                playIcon.className = "fa-solid fa-play";
                if (event.data == YT.PlayerState.ENDED) nextTrack();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.remove('hidden');
            document.getElementById('searchBtn').addEventListener('click', performLiveSearch);
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performLiveSearch(); });
            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('nextBtn').addEventListener('click', nextTrack);

            setInterval(() => {
                if (player?.getCurrentTime && appState.isPlaying) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        document.getElementById('progressBar').style.width = `${(currentTime / duration) * 100}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                    }
                }
            }, 500);
        });

        // FUNZIONE DI RICERCA LIVE CON STRINGENTE SISTEMA DI MULTI-FALLBACK AUTOMATICO
        async function performLiveSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const placeholder = document.getElementById('placeholderText');
            if (placeholder) placeholder.innerText = "Ricerca live in corso...";

            let success = false;
            let attempts = 0;

            // Tenta su varie istanze fino a che una non risponde con il JSON pulito
            while (!success && attempts < INVIDIOUS_INSTANCES.length) {
                const currentBase = INVIDIOUS_INSTANCES[currentInstanceIndex];
                try {
                    const response = await fetch(`${currentBase}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                    if (!response.ok) throw new Error("Istanza non raggiungibile");

                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        appState.tracks = data.slice(0, 15).map(video => ({
                            id: video.videoId,
                            title: video.title,
                            channel: video.author,
                            thumbnail: `https://img.youtube.com/vi/${video.videoId}/default.jpg`
                        }));
                        success = true;
                    } else {
                        throw new Error("Nessun dato valido");
                    }
                } catch (e) {
                    attempts++;
                    // Ruota l'istanza all'istante in caso di errore
                    currentInstanceIndex = (currentInstanceIndex + 1) % INVIDIOUS_INSTANCES.length;
                }
            }

            if (success) {
                renderTracklist();
            } else {
                if (placeholder) placeholder.innerText = "Nessun risultato trovato o server momentaneamente carichi. Riprova tra poco.";
            }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; trackListDiv.innerHTML = '';

            appState.tracks.forEach((track, index) => {
                const trackRow = document.createElement('div');
                trackRow.className = `flex items-center p-3 rounded active:bg-[#282828] md:hover:bg-[#282828] cursor-pointer transition-colors ${appState.currentIndex === index ? 'bg-[#1a1a1a]' : ''}`;
                
                trackRow.innerHTML = `
                    <div class="w-6 text-gray-400 text-xs text-center">${index + 1}</div>
                    <img src="${track.thumbnail}" class="w-9 h-9 object-cover rounded mx-2.5" onerror="this.src='https://placehold.co/36x36/181818/ffffff?text=Beat'">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-medium truncate ${appState.currentIndex === index ? 'text-[#1DB954]' : 'text-white'}">${track.title}</p>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">${track.channel}</p>
                    </div>
                `;
                trackRow.addEventListener('click', () => loadTrack(index));
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            
            appState.currentIndex = index;
            const track = appState.tracks[index];

            document.getElementById('playerTrackTitle').innerText = track.title;
            document.getElementById('playerTrackChannel').innerText = track.channel;

            if (player?.loadVideoById) player.loadVideoById(track.id);
            renderTracklist();
            checkAndApplyMarquee();
        }

        function checkAndApplyMarquee() {
            const marqueeContent = document.getElementById('marqueeContent');
            const wrapper = document.getElementById('swipeTitleContainer').querySelector('.marquee-wrapper');
            marqueeContent.classList.remove('animate-marquee');
            
            const cleanText = `<span id="playerTrackTitle" class="text-sm font-bold text-white">${document.getElementById('playerTrackTitle').innerText}</span><span id="playerTrackChannel" class="text-xs text-gray-400 ml-2 font-normal">${document.getElementById('playerTrackChannel').innerText}</span>`;
            marqueeContent.innerHTML = cleanText;

            if (marqueeContent.scrollWidth > wrapper.clientWidth) {
                marqueeContent.innerHTML += "<span class='inline-block w-16'></span>" + cleanText;
                marqueeContent.classList.add('animate-marquee');
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            loadTrack((appState.currentIndex + 1) % appState.tracks.length);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            loadTrack((appState.currentIndex - 1 + appState.tracks.length) % appState.tracks.length);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
