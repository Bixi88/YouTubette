<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: system-ui, -apple-system, sans-serif;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body class="text-gray-200 flex flex-col justify-between h-full p-4 selection:bg-purple-500/30">

    <audio id="audioPlayer" preload="auto"></audio>

    <div class="w-full max-w-md mx-auto pt-2">
        <div class="relative flex items-center bg-zinc-900 rounded-full border border-zinc-800 focus-within:border-purple-500 transition-all px-4 py-2.5 shadow-xl">
            <i class="fa-solid fa-magnifying-glass text-zinc-500 mr-3"></i>
            <input type="text" id="searchInput" placeholder="Cerca beat... (es. free rnb)" 
                   class="w-full bg-transparent outline-none text-sm placeholder-zinc-500 text-white pr-2">
            <button id="searchBtn" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold px-4 py-1.5 rounded-full transition-colors shrink-0">
                Cerca
            </button>
        </div>
    </div>

    <div class="flex-1 w-full max-w-md mx-auto my-4 overflow-hidden flex flex-col justify-center items-center relative">
        
        <div id="resultsContainer" class="w-full h-full overflow-y-auto space-y-2 hidden pr-1"></div>

        <div id="playerView" class="flex flex-col items-center text-center animate-fade-in w-full px-4">
            <div class="w-60 h-60 md:w-64 md:h-64 rounded-2xl overflow-hidden shadow-2xl shadow-purple-900/20 border border-zinc-800 bg-zinc-900 flex items-center justify-center mb-6 relative group">
                <img id="trackArt" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400" alt="Cover" class="w-full h-full object-cover">
            </div>
            <h2 id="trackTitle" class="text-lg font-bold text-white truncate w-full max-w-xs mb-1">Nessuna traccia</h2>
            <p id="trackArtist" class="text-sm text-zinc-400 truncate w-full max-w-xs">Cerca un brano per iniziare</p>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto pb-4 bg-zinc-950/40 backdrop-blur-md rounded-3xl p-4 border border-zinc-900/80 shadow-2xl">
        <div class="w-full flex items-center justify-between text-[10px] text-zinc-500 mb-2 px-1 font-mono">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
        <div id="progressContainer" class="w-full h-1.5 bg-zinc-800 rounded-full mb-5 cursor-pointer relative group">
            <div id="progressBar" class="h-full bg-gradient-to-r from-purple-600 to-pink-500 rounded-full w-0 "></div>
        </div>

        <div class="flex items-center justify-center gap-6">
            <button id="prevBtn" class="text-zinc-400 hover:text-white text-lg p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="backwardBtn" class="text-zinc-500 hover:text-white text-sm p-2"><i class="fa-solid fa-backward text-xs mr-0.5"></i>10s</button>
            
            <button id="playBtn" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                <i id="playIcon" class="fa-solid fa-play ml-0.5"></i>
            </button>
            
            <button id="forwardBtn" class="text-zinc-500 hover:text-white text-sm p-2">10s<i class="fa-solid fa-forward text-xs ml-0.5"></i></button>
            <button id="nextBtn" class="text-zinc-400 hover:text-white text-lg p-2"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

    <script>
        // Utilizziamo un proxy CORS ultrarapido e un'istanza Invidious stabile
        const PROXY_URL = "https://corsproxy.io/?";
        const INVIDIOUS_INSTANCE = "https://invidious.flokinet.to"; 

        const audio = document.getElementById('audioPlayer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const playerView = document.getElementById('playerView');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        
        let appState = { tracks: [], currentIndex: -1, isPlaying: false };

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            searchBtn.disabled = true;
            searchBtn.innerText = "...";
            resultsContainer.innerHTML = `<div class="text-center text-zinc-500 text-sm py-8"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Ricerca beats su YouTube...</div>`;
            resultsContainer.classList.remove('hidden');
            playerView.classList.add('hidden');

            try {
                // Interroga Invidious passando per il proxy corsproxy.io
                const apiTarget = `${INVIDIOUS_INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}&type=video`;
                const response = await fetch(`${PROXY_URL}${encodeURIComponent(apiTarget)}`);
                
                if (!response.ok) throw new Error();
                const items = await response.json();

                if (!items || items.length === 0) {
                    resultsContainer.innerHTML = `<div class="text-center text-zinc-500 text-sm py-8">Nessun risultato. Riprova con parole chiave diverse.</div>`;
                    return;
                }

                appState.tracks = items.slice(0, 15).map(item => ({
                    id: item.videoId,
                    title: item.title,
                    artist: item.author,
                    thumbnail: item.videoThumbnails?.find(t => t.quality === 'medium')?.url || (item.videoThumbnails && item.videoThumbnails[0]?.url) || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=200'
                }));

                renderResults();
            } catch (err) {
                console.error(err);
                resultsContainer.innerHTML = `<div class="text-center text-red-400 text-sm py-8">Connessione temporaneamente instabile. Premi di nuovo Cerca.</div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerText = "Cerca";
            }
        }

        function renderResults() {
            resultsContainer.innerHTML = "";
            appState.tracks.forEach((track, idx) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-3 bg-zinc-900/60 hover:bg-zinc-800/80 p-2.5 rounded-xl cursor-pointer transition-all group";
                row.innerHTML = `
                    <img src="${track.thumbnail}" class="w-12 h-12 object-cover rounded-lg shrink-0 bg-zinc-800" onerror="this.src='https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=100'">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-white truncate group-hover:text-purple-400 transition-colors">${track.title}</p>
                        <p class="text-xs text-zinc-400 truncate">${track.artist}</p>
                    </div>
                `;
                row.onclick = () => selectTrack(idx);
                resultsContainer.appendChild(row);
            });
        }

        async function selectTrack(index) {
            appState.currentIndex = index;
            const track = appState.tracks[index];

            document.getElementById('trackTitle').innerText = track.title;
            document.getElementById('trackArtist').innerText = track.artist;
            document.getElementById('trackArt').src = track.thumbnail;
            
            resultsContainer.classList.add('hidden');
            playerView.classList.remove('hidden');

            try {
                playIcon.className = "fa-solid fa-circle-notch animate-spin ml-0";
                
                // Genera l'url stream audio diretto bypassando il CORS
                const streamTarget = `${INVIDIOUS_INSTANCE}/latest_version?id=${track.id}&itag=140`;
                audio.src = `${PROXY_URL}${encodeURIComponent(streamTarget)}`;
                
                await audio.play();
                appState.isPlaying = true;
                updatePlayButton();
                setupMediaSession(track);
            } catch (err) {
                console.error(err);
                // Fallback nel caso in cui l'itag audio 140 fallisca, prova il flusso video/audio combinato standard
                try {
                    const fallbackTarget = `${INVIDIOUS_INSTANCE}/latest_version?id=${track.id}`;
                    audio.src = `${PROXY_URL}${encodeURIComponent(fallbackTarget)}`;
                    await audio.play();
                    appState.isPlaying = true;
                    updatePlayButton();
                } catch(e) {
                    alert("Questo beat è protetto o non disponibile allo streaming diretto. Scegline un altro.");
                    playIcon.className = "fa-solid fa-play ml-0.5";
                }
            }
        }

        function togglePlay() {
            if (appState.currentIndex === -1) return;
            if (appState.isPlaying) { audio.pause(); appState.isPlaying = false; } 
            else { audio.play(); appState.isPlaying = true; }
            updatePlayButton();
        }

        function updatePlayButton() {
            playIcon.className = appState.isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play ml-0.5";
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('durationTime').innerText = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => { nextTrack(); });

        progressContainer.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            selectTrack((appState.currentIndex + 1) % appState.tracks.length);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let p = appState.currentIndex - 1;
            selectTrack(p < 0 ? appState.tracks.length - 1 : p);
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function setupMediaSession(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.artist,
                    artwork: [{ src: track.thumbnail, sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); appState.isPlaying = true; updatePlayButton(); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); appState.isPlaying = false; updatePlayButton(); });
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        document.getElementById('forwardBtn').addEventListener('click', () => { audio.currentTime += 10; });
        document.getElementById('backwardBtn').addEventListener('click', () => { audio.currentTime -= 10; });
    </script>
</body>
</html>
