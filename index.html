<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #121212;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #282828; border-radius: 2px; }

        /* Contenitore Marquee Fluido */
        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, #fff 4%, #fff 96%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 4%, #fff 96%, transparent);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }

        /* Swipe container lineare accelerato */
        #swipeTitleContainer {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            touch-action: pan-y;
        }
        #swipeTitleContainer.dragging {
            transition: none !important;
        }
        
        /* Personalizzazione slider volume in stile Spotify */
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col justify-between hidden bg-[#121212]">

    <header class="h-16 bg-[#000000] px-4 flex items-center justify-between border-b border-[#282828] shrink-0 z-40">
        <div class="flex items-center space-x-2 text-[#1DB954] text-xl font-bold tracking-tight shrink-0">
            <i class="fa-solid fa-radio"></i>
            <span class="hidden sm:inline text-white font-extrabold ml-1">YouTubette</span>
        </div>
        
        <div class="flex-1 max-w-lg mx-4 relative">
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca beat... (es. free rnb)" 
                    class="w-full bg-[#242424] text-sm text-white pl-11 pr-24 py-2.5 rounded-full border border-transparent focus:outline-none focus:border-[#1DB954] focus:bg-[#2a2a2a] transition-all">
                
                <div class="absolute right-2 flex items-center space-x-1">
                    <button id="filterToggleBtn" class="text-gray-400 hover:text-white p-1.5 text-sm" title="Filtri avanzati">
                        <i class="fa-solid fa-sliders"></i>
                    </button>
                    <button id="searchBtn" class="bg-[#1DB954] text-black font-bold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform">
                        Cerca
                    </button>
                </div>
            </div>

            <!-- Pannello Filtri Dropdown -->
            <div id="filterMenu" class="hidden absolute top-full left-0 right-0 mt-2 bg-[#181818] border border-[#282828] rounded-xl p-4 shadow-2xl z-50 space-y-3 animate-fade-in">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Filtri di Ricerca</p>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">Ordina per</label>
                        <select id="filterOrder" class="w-full bg-[#242424] text-xs text-white p-2 rounded border border-transparent focus:outline-none focus:border-[#1DB954]">
                            <option value="relevance">Rilevanza</option>
                            <option value="date" selected>Data di pubblicazione</option>
                            <option value="viewCount">Visualizzazioni</option>
                            <option value="rating">Valutazione</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">Durata</label>
                        <select id="filterDuration" class="w-full bg-[#242424] text-xs text-white p-2 rounded border border-transparent focus:outline-none focus:border-[#1DB954]">
                            <option value="any" selected>Qualsiasi</option>
                            <option value="short">Breve (&lt; 4 min)</option>
                            <option value="medium">Media (4-20 min)</option>
                            <option value="long">Lunga (&gt; 20 min)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">Caricato in</label>
                        <select id="filterPublishedAfter" class="w-full bg-[#242424] text-xs text-white p-2 rounded border border-transparent focus:outline-none focus:border-[#1DB954]">
                            <option value="any" selected>Qualsiasi momento</option>
                            <option value="hour">Ultima ora</option>
                            <option value="day">Oggi</option>
                            <option value="week">Questa settimana</option>
                            <option value="month">Questo mese</option>
                            <option value="year">Quest'anno</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="shrink-0 flex items-center space-x-1">
            <button id="pwaInstallBtn" class="hidden bg-[#1DB954] text-black font-bold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform">
                <i class="fa-solid fa-download mr-1"></i> Installa
            </button>
            <button id="apiConfigBtn" class="text-gray-400 hover:text-white p-2" title="Configura API Key">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col-reverse md:flex-row overflow-hidden bg-[#121212]">
        <!-- Playlist -->
        <section class="flex-1 md:w-3/5 bg-[#121212] p-3 flex flex-col border-t md:border-t-0 md:border-r border-[#282828] overflow-y-auto h-full">
            <h2 class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-2 px-1">Risultati Ricerca</h2>
            <div id="trackList" class="space-y-1 pb-4">
                <p id="placeholderText" class="text-gray-500 text-xs p-4 italic text-center mt-6">Inserisci una chiave di ricerca in alto.</p>
            </div>
        </section>

        <!-- Video ridotto -->
        <section class="flex flex-col bg-black md:w-2/5 h-44 md:h-full relative shrink-0 md:shrink border-b md:border-b-0 border-[#282828]">
            <div class="w-full flex-1 bg-black flex items-center justify-center overflow-hidden relative">
                <div id="ytPlayerContainer" class="w-full h-full absolute inset-0"></div>
                <div id="coverFallback" class="absolute inset-0 flex flex-col items-center justify-center bg-[#181818] text-gray-500 pointer-events-none z-10">
                    <i class="fa-solid fa-music text-2xl md:text-4xl mb-2 text-[#1DB954]"></i>
                    <p class="text-xs font-medium px-4 text-center text-gray-300" id="currentDisplayTitle">Nessun beat in riproduzione</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer id="footerControls" class="bg-[#181818] border-t border-[#282828] px-4 pt-4 pb-6 flex flex-col items-center shrink-0 z-40 select-none">
        
        <!-- Titolo Swipabile Lineare -->
        <div id="swipeTitleContainer" class="w-full text-center py-2 mb-1 cursor-grab active:cursor-grabbing bg-transparent select-none">
            <div class="marquee-wrapper mx-auto max-w-xl pointer-events-none">
                <div id="marqueeContent" class="marquee-content">
                    <span id="playerTrackTitle" class="text-sm md:text-base font-bold text-white">Scegli un beat</span>
                    <span id="playerTrackChannel" class="text-xs text-gray-400 ml-3 font-normal">Nessun canale</span>
                </div>
            </div>
        </div>

        <!-- Barra di progresso con popup di scrub -->
        <div class="w-full flex items-center space-x-3 text-xs text-gray-400 mb-4 max-w-2xl relative">
            <span id="currentTime" class="w-9 text-left select-none">0:00</span>
            
            <div class="flex-1 bg-[#4d4d4d] h-4 rounded-full relative cursor-pointer py-1" id="progressBarContainer">
                <div class="bg-[#282828] w-full h-2 rounded-full absolute top-1 left-0"></div>
                <div class="bg-[#1DB954] h-2 rounded-full w-0 absolute top-1 left-0" id="progressBar"></div>
                
                <!-- Tooltip di Scrubbing -->
                <div id="scrubTooltip" class="hidden absolute bottom-6 bg-[#282828] text-white font-bold text-[11px] px-2 py-1 rounded shadow-xl border border-[#3e3e3e] pointer-events-none transform -translate-x-1/2">
                    0:00
                </div>
            </div>
            
            <span id="durationTime" class="w-9 text-right select-none">0:00</span>
        </div>

        <!-- Pulsanti Mobile -->
        <div class="flex items-center justify-center space-x-6 md:hidden w-full">
            <button id="mobileBack10Btn" class="text-gray-400 active:text-white text-base p-2"><i class="fa-solid fa-arrow-rotate-left"></i> 10</button>
            <button id="mobilePrevBtn" class="text-gray-400 active:text-white text-xl p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="mobilePlayPauseBtn" class="bg-white text-black w-14 h-14 rounded-full flex items-center justify-center active:scale-95 text-xl pl-0.5 shadow-lg">
                <i class="fa-solid fa-play" id="mobilePlayIcon"></i>
            </button>
            <button id="mobileNextBtn" class="text-gray-400 active:text-white text-xl p-2"><i class="fa-solid fa-forward-step"></i></button>
            <button id="mobileForward10Btn" class="text-gray-400 active:text-white text-base p-2">10 <i class="fa-solid fa-arrow-rotate-right"></i></button>
        </div>

        <!-- Pulsanti Desktop -->
        <div class="hidden md:flex items-center justify-center space-x-8 w-full">
            <button id="back10Btn" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center space-x-1 p-2" title="-10 Secondi"><i class="fa-solid fa-arrow-rotate-left"></i> <span>10s</span></button>
            <button id="prevBtn" class="text-gray-400 hover:text-white transition-colors text-2xl p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="playPauseBtn" class="bg-white text-black w-14 h-14 rounded-full flex items-center justify-center hover:scale-105 transition-transform text-xl pl-0.5 shadow-md">
                <i class="fa-solid fa-play" id="playIcon"></i>
            </button>
            <button id="nextBtn" class="text-gray-400 hover:text-white transition-colors text-2xl p-2"><i class="fa-solid fa-forward-step"></i></button>
            <button id="forward10Btn" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center space-x-1 p-2" title="+10 Secondi"><span>10s</span> <i class="fa-solid fa-arrow-rotate-right"></i></button>
            
            <div class="w-6"></div>
            <div class="flex items-center space-x-2 text-gray-400">
                <i class="fa-solid fa-volume-high text-base"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" 
                    class="w-28 h-1 bg-[#4d4d4d] rounded-full appearance-none cursor-pointer">
            </div>
        </div>
    </footer>

    <!-- MODAL CUSTOM PER CONFIGURAZIONE API (Stile Spotify) -->
    <div id="apiModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-[#181818] border border-[#282828] w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
            <h3 class="text-lg font-bold text-white mb-2 flex items-center"><i class="fa-solid fa-key text-[#1DB954] mr-2"></i> Configura YouTube API Key</h3>
            <p class="text-xs text-gray-400 mb-4">Inserisci la tua YouTube Data API v3 Key. I dati verranno salvati localmente sul tuo dispositivo.</p>
            
            <input type="password" id="modalApiKeyInput" placeholder="AIzaSy..." 
                class="w-full bg-[#242424] text-sm text-white px-4 py-3 rounded-xl border border-transparent focus:outline-none focus:border-[#1DB954] mb-5">
            
            <div class="flex items-center justify-end space-x-3">
                <button id="modalCancelBtn" class="text-gray-400 hover:text-white font-semibold text-xs px-4 py-2.5 rounded-full transition-colors">Annulla</button>
                <button id="modalSaveBtn" class="bg-[#1DB954] text-black font-bold text-xs px-5 py-2.5 rounded-full active:scale-95 transition-all">Salva Chiave</button>
            </div>
        </div>
    </div>

    <script>
        let appState = {
            apiKey: localStorage.getItem('youtubette_api_key') || '',
            tracks: [],
            currentIndex: -1,
            isPlaying: false
        };

        let deferredPrompt, nextSearchPageToken = '', isFetchingMore = false;

        // Gestione Marquee Fluido (senza scatti)
        let marqueeOffset = 0;
        let marqueeAnimationFrame;
        const swipeTitle = document.getElementById('swipeTitleContainer');
        const marqueeContent = document.getElementById('marqueeContent');
        const wrapper = swipeTitle.querySelector('.marquee-wrapper');

        // Drag e Swipe Lineare (Senza rotazione curva)
        let startX = 0, currentX = 0, isDragging = false;
        let isScrubbing = false; // Gestione stato per la barra temporale

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            if (document.getElementById('pwaInstallBtn')) document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(document.getElementById('volumeSlider')?.value || 100);
            startProgressLoop();
            setupMediaSessionHandlers();
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon'), mobilePlayIcon = document.getElementById('mobilePlayIcon');
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                if(playIcon) playIcon.className = "fa-solid fa-pause";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-pause";
                document.getElementById('coverFallback').style.display = "none";
                updateDuration(); updateMediaSessionState(true);
            } else {
                appState.isPlaying = false;
                if(playIcon) playIcon.className = "fa-solid fa-play pl-0.5";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-play";
                updateMediaSessionState(false);
                if (event.data == YT.PlayerState.ENDED) nextTrack();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.remove('hidden');
            
            document.getElementById('searchBtn').addEventListener('click', () => performSearch(false));
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(false); });
            
            // Toggle menu filtri
            document.getElementById('filterToggleBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('filterMenu').classList.toggle('hidden');
            });
            document.addEventListener('click', () => document.getElementById('filterMenu').classList.add('hidden'));
            document.getElementById('filterMenu').addEventListener('click', (e) => e.stopPropagation());

            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('nextBtn').addEventListener('click', nextTrack);
            document.getElementById('back10Btn').addEventListener('click', () => jumpSeconds(-10));
            document.getElementById('forward10Btn').addEventListener('click', () => jumpSeconds(10));

            document.getElementById('mobilePlayPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('mobilePrevBtn').addEventListener('click', prevTrack);
            document.getElementById('mobileNextBtn').addEventListener('click', nextTrack);
            document.getElementById('mobileBack10Btn').addEventListener('click', () => jumpSeconds(-10));
            document.getElementById('mobileForward10Btn').addEventListener('click', () => jumpSeconds(10));
            
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => player?.setVolume(e.target.value));
            
            // Setup Gestione Modal Custom API Key
            document.getElementById('apiConfigBtn').addEventListener('click', openApiModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeApiModal);
            document.getElementById('modalSaveBtn').addEventListener('click', saveApiKeyFromModal);

            // Interazione Avanzata Barra Progresso (Scrubbing e Popup Temporale)
            const pBarContainer = document.getElementById('progressBarContainer');
            pBarContainer.addEventListener('mousedown', startScrub);
            window.addEventListener('mousemove', moveScrub);
            window.addEventListener('mouseup', endScrub);

            pBarContainer.addEventListener('touchstart', startScrub, { passive: true });
            window.addEventListener('touchmove', moveScrub, { passive: false });
            window.addEventListener('touchend', endScrub, { passive: true });

            // Eventi Drag Lineari per il Titolo
            swipeTitle.addEventListener('touchstart', dragStart, { passive: true });
            swipeTitle.addEventListener('touchmove', dragMove, { passive: false });
            swipeTitle.addEventListener('touchend', dragEnd, { passive: true });

            swipeTitle.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);
        });

        // Logica Custom Scrubbing Temporale
        function getScrubProgress(e) {
            const pBarContainer = document.getElementById('progressBarContainer');
            const rect = pBarContainer.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let offset = (clientX - rect.left) / rect.width;
            return Math.max(0, Math.min(offset, 1));
        }

        function startScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            document.getElementById('scrubTooltip').classList.remove('hidden');
            moveScrub(e);
        }

        function moveScrub(e) {
            if (!isScrubbing) return;
            const progress = getScrubProgress(e);
            const duration = player.getDuration() || 0;
            const targetTime = duration * progress;
            
            // Aggiorna visivamente la barra e il popup al volo
            document.getElementById('progressBar').style.width = `${progress * 100}%`;
            
            const tooltip = document.getElementById('scrubTooltip');
            tooltip.innerText = formatTime(targetTime);
            
            // Posiziona il tooltip sopra il dito/cursore
            const pBarContainer = document.getElementById('progressBarContainer');
            const rect = pBarContainer.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let relativeX = clientX - rect.left;
            tooltip.style.left = `${Math.max(0, Math.min(relativeX, rect.width))}px`;
        }

        function endScrub(e) {
            if (!isScrubbing) return;
            isScrubbing = false;
            document.getElementById('scrubTooltip').classList.add('hidden');
            
            const progress = getScrubProgress(e);
            const duration = player.getDuration() || 0;
            player.seekTo(duration * progress, true);
        }

        // Drag Lineare senza Rotazione Curva
        function dragStart(e) {
            isDragging = true;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            swipeTitle.classList.add('dragging');
            stopMarqueeAnimation();
        }

        function dragMove(e) {
            if (!isDragging) return;
            currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
            
            // Movimento unicamente sull'asse X lineare e calcolo del Fade (Opacità)
            const opacity = Math.max(0.1, 1 - Math.abs(currentX) / 300);
            swipeTitle.style.transform = `translate3d(${currentX}px, 0, 0)`;
            swipeTitle.style.opacity = opacity;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            swipeTitle.classList.remove('dragging');

            const threshold = 80;

            if (currentX > threshold) {
                animateOutAndChange('right');
            } else if (currentX < -threshold) {
                animateOutAndChange('left');
            } else {
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
                checkAndApplyMarquee();
            }
            currentX = 0;
        }

        function animateOutAndChange(direction) {
            swipeTitle.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
            swipeTitle.style.transform = `translate3d(${direction === 'right' ? '100%' : '-100%'}, 0, 0)`;
            swipeTitle.style.opacity = '0';

            setTimeout(() => {
                if (direction === 'right') prevTrack(); else nextTrack();

                swipeTitle.style.transition = 'none';
                swipeTitle.style.transform = `translate3d(${direction === 'right' ? '-100%' : '100%'}, 0, 0)`;
                swipeTitle.offsetHeight; // Trigger reflow

                swipeTitle.style.transition = 'transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease-out';
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
            }, 180);
        }

        // Loop Marquee Continuo e Fluido ad alta precisione
        function stopMarqueeAnimation() {
            if (marqueeAnimationFrame) cancelAnimationFrame(marqueeAnimationFrame);
        }

        function checkAndApplyMarquee() {
            stopMarqueeAnimation();
            marqueeOffset = 0;
            marqueeContent.style.transform = 'translate3d(0,0,0)';
            
            const titleText = document.getElementById('playerTrackTitle').innerText;
            const channelText = document.getElementById('playerTrackChannel').innerText;
            
            const baseHTML = `<span id="playerTrackTitle" class="text-sm md:text-base font-bold text-white">${titleText}</span><span id="playerTrackChannel" class="text-xs text-gray-400 ml-3 font-normal">${channelText}</span>`;
            marqueeContent.innerHTML = baseHTML;

            const singleWidth = marqueeContent.scrollWidth;
            if (singleWidth > wrapper.clientWidth) {
                // Raddoppia la stringa con uno spazio di stacco per creare l'anello infinito continuo
                marqueeContent.innerHTML = baseHTML + "<span class='inline-block w-24'></span>" + baseHTML;
                const totalLoopWidth = singleWidth + 96; // 96px corrisponde alla larghezza dello span w-24
                
                function tick() {
                    if (isDragging) return;
                    marqueeOffset -= 0.8; // Velocità di scorrimento fluida dei pixel per frame
                    if (Math.abs(marqueeOffset) >= totalLoopWidth) {
                        marqueeOffset = 0;
                    }
                    marqueeContent.style.transform = `translate3d(${marqueeOffset}px, 0, 0)`;
                    marqueeAnimationFrame = requestAnimationFrame(tick);
                }
                marqueeAnimationFrame = requestAnimationFrame(tick);
            }
        }

        // Gestione Modal Custom Stile Spotify
        function openApiModal() {
            document.getElementById('modalApiKeyInput').value = appState.apiKey;
            document.getElementById('apiModal').classList.remove('hidden');
        }
        function closeApiModal() {
            document.getElementById('apiModal').classList.add('hidden');
        }
        function saveApiKeyFromModal() {
            const key = document.getElementById('modalApiKeyInput').value.trim();
            appState.apiKey = key;
            localStorage.setItem('youtubette_api_key', key);
            closeApiModal();
            alert(key ? "API Key salvata con successo!" : "API Key rimossa.");
        }

        async function performSearch(isLoadMore = false) {
            const query = document.getElementById('searchInput').value.trim();
            if (!query || (isLoadMore && isFetchingMore)) return;
            if (!appState.apiKey) { openApiModal(); return; }

            const placeholderText = document.getElementById('placeholderText');
            if (!isLoadMore) {
                if (placeholderText) placeholderText.innerText = "Ricerca in corso...";
                appState.tracks = []; appState.currentIndex = -1; nextSearchPageToken = '';
            } else isFetchingMore = true;

            // Raccolta dei filtri attivi
            const order = document.getElementById('filterOrder').value;
            const duration = document.getElementById('filterDuration').value;
            const publishedAfterSelect = document.getElementById('filterPublishedAfter').value;

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&order=${order}&key=${appState.apiKey}`;
                
                if (duration !== 'any') url += `&videoDuration=${duration}`;
                
                if (publishedAfterSelect !== 'any') {
                    const now = new Date();
                    if (publishedAfterSelect === 'hour') now.setHours(now.getHours() - 1);
                    else if (publishedAfterSelect === 'day') now.setDate(now.getDate() - 1);
                    else if (publishedAfterSelect === 'week') now.setDate(now.getDate() - 7);
                    else if (publishedAfterSelect === 'month') now.setMonth(now.getMonth() - 1);
                    else if (publishedAfterSelect === 'year') now.setFullYear(now.getFullYear() - 1);
                    url += `&publishedAfter=${now.toISOString()}`;
                }

                if (nextSearchPageToken) url += `&pageToken=${nextSearchPageToken}`;

                const response = await fetch(url);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                nextSearchPageToken = data.nextPageToken || '';
                let newTracks = data.items.map(item => ({
                    id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle, thumbnail: item.snippet.thumbnails.default.url
                }));

                // Se l'ordine non è impostato su data, applichiamo un leggero rimescolamento facoltativo per varietà
                if (order !== 'date') {
                    for (let i = newTracks.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newTracks[i], newTracks[j]] = [newTracks[j], newTracks[i]];
                    }
                }

                appState.tracks = appState.tracks.concat(newTracks);
                renderTracklist();
            } catch (error) {
                alert(error.message);
            } finally { if (isLoadMore) isFetchingMore = false; }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; trackListDiv.innerHTML = '';
            
            if (appState.tracks.length === 0) {
                trackListDiv.innerHTML = '<p class="text-gray-500 text-sm p-2 italic text-center">Nessun risultato trovato con questi filtri.</p>'; return;
            }

            appState.tracks.forEach((track, index) => {
                const trackRow = document.createElement('div');
                trackRow.id = `track-row-${index}`;
                trackRow.className = `flex items-center p-2 rounded active:bg-[#282828] md:hover:bg-[#282828] cursor-pointer transition-colors ${appState.currentIndex === index ? 'bg-[#282828]' : ''}`;
                trackRow.innerHTML = `
                    <div class="w-6 text-gray-400 text-xs text-center">${index + 1}</div>
                    <img src="${track.thumbnail}" class="w-9 h-9 object-cover rounded mx-2.5">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-medium truncate ${appState.currentIndex === index ? 'text-[#1DB954]' : 'text-white'}">${track.title}</p>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">${track.channel}</p>
                    </div>
                `;
                trackRow.addEventListener('click', () => {
                    loadTrack(index);
                    if (index === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
                });
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            
            if (appState.currentIndex !== -1) {
                const oldRow = document.getElementById(`track-row-${appState.currentIndex}`);
                if (oldRow) {
                    oldRow.classList.remove('bg-[#282828]');
                    const oldText = oldRow.querySelector('p.text-xs');
                    if (oldText) { oldText.classList.remove('text-[#1DB954]'); oldText.classList.add('text-white'); }
                }
            }

            appState.currentIndex = index;
            const track = appState.tracks[index];

            document.getElementById('playerTrackTitle').innerText = track.title;
            document.getElementById('playerTrackChannel').innerText = track.channel;

            const newRow = document.getElementById(`track-row-${index}`);
            if (newRow) {
                newRow.classList.add('bg-[#282828]');
                const newText = newRow.querySelector('p.text-xs');
                if (newText) { newText.classList.remove('text-white'); newText.classList.add('text-[#1DB954]'); }
            }

            if (player?.loadVideoById) player.loadVideoById(track.id);
            
            checkAndApplyMarquee();
            updateMediaSessionMetadata(track);
        }

        function updateMediaSessionMetadata(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.channel, album: 'YouTubette Beats',
                    artwork: [{ src: track.thumbnail, sizes: '120x120', type: 'image/jpeg' }]
                });
            }
        }

        function updateMediaSessionState(isPlaying) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
        }

        function setupMediaSessionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let nextIdx = appState.currentIndex + 1;
            if (nextIdx >= appState.tracks.length) {
                if (nextSearchPageToken) {
                    performSearch(true).then(() => { if (appState.tracks[nextIdx]) loadTrack(nextIdx); });
                } else loadTrack(0);
            } else {
                loadTrack(nextIdx);
                if (nextIdx === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
            }
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let prevIdx = appState.currentIndex - 1;
            if (prevIdx < 0) prevIdx = appState.tracks.length - 1;
            loadTrack(prevIdx);
        }

        function jumpSeconds(seconds) {
            if (!player?.getCurrentTime || appState.currentIndex === -1) return;
            let targetTime = player.getCurrentTime() + seconds;
            player.seekTo(Math.max(0, Math.min(targetTime, player.getDuration())), true);
        }

        function startProgressLoop() {
            setInterval(() => {
                // Aggiorna la barra solo se NON stiamo effettuando uno scrub manuale col dito
                if (player?.getCurrentTime && appState.isPlaying && !isScrubbing) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        document.getElementById('progressBar').style.width = `${(currentTime / duration) * 100}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                    }
                }
            }, 500);
        }

        function updateDuration() {
            if (player?.getDuration) document.getElementById('durationTime').innerText = formatTime(player.getDuration());
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "0:00";
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
