<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #121212;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }
        .animate-marquee {
            animation: marqueeLoop 15s linear infinite;
        }
        @keyframes marqueeLoop {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        #swipeTitleContainer {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            touch-action: pan-y;
        }
        #swipeTitleContainer.dragging {
            transition: none !important;
        }
        
        #progressBar.scrubbing {
            transition: none !important;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col justify-between hidden bg-[#121212]">

    <header class="h-16 bg-black px-3 flex items-center justify-between border-b border-[#282828] shrink-0 z-50">
        <div class="flex items-center space-x-1.5 text-[#1DB954] text-xl font-bold tracking-tight shrink-0">
            <i class="fa-solid fa-radio"></i>
            <span class="hidden sm:inline text-white font-bold ml-1">YouTubette</span>
        </div>
        
        <div class="flex-1 max-w-md mx-2 relative">
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca beat... (es. free rnb)" 
                    class="w-full bg-[#242424] text-sm text-white pl-10 pr-28 py-2 rounded-full border border-transparent focus:outline-none focus:border-white focus:bg-[#2a2a2a] transition-all">
                
                <div class="absolute right-1.5 flex items-center space-x-1">
                    <button id="apiSettingsBtn" class="text-gray-400 hover:text-white p-1.5 text-sm" title="Impostazioni API Key">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button id="searchBtn" class="bg-[#1DB954] text-black font-semibold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform">
                        Cerca
                    </button>
                </div>
            </div>

            <div id="apiMenu" class="hidden absolute top-full left-0 right-0 mt-2 bg-[#181818] border border-[#282828] rounded-2xl p-4 shadow-2xl z-50 space-y-3">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Configurazione YouTube API</p>
                <div class="space-y-2">
                    <label class="block text-[11px] text-gray-300">Inserisci YouTube Data API Key v3:</label>
                    <input type="password" id="apiKeyInput" placeholder="Incolla AIzaSy..." class="w-full bg-[#242424] text-xs text-white p-2 rounded-xl border border-zinc-700 focus:outline-none focus:border-[#1DB954]">
                    <button id="saveApiKeyBtn" class="w-full bg-[#1DB954] text-black text-xs font-bold py-2 rounded-xl active:scale-95 transition-transform">
                        Salva Chiave
                    </button>
                </div>
            </div>
        </div>

        <div class="shrink-0 flex items-center space-x-1">
            <button id="pwaInstallBtn" class="hidden bg-[#1DB954] text-black font-bold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform">
                <i class="fa-solid fa-download mr-1"></i> Installa
            </button>
            <div class="w-2"></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col-reverse md:flex-row overflow-hidden bg-[#121212]">
        <section class="flex-1 md:w-3/5 bg-black p-3 flex flex-col border-t md:border-t-0 md:border-r border-[#282828] overflow-y-auto h-full">
            <h2 class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-2 px-1">Risultati Ricerca Ufficiali</h2>
            <div id="trackList" class="space-y-1 pb-4">
                <p id="placeholderText" class="text-gray-500 text-xs p-4 italic text-center mt-6">Inserisci un termine e premi cerca (Assicurati di aver configurato l'API Key dall'ingranaggio).</p>
            </div>
        </section>

        <section class="flex flex-col bg-black md:w-2/5 h-44 md:h-full relative shrink-0 md:shrink border-b md:border-b-0 border-[#282828]">
            <div class="w-full flex-1 bg-black flex items-center justify-center overflow-hidden relative">
                <div style="position: absolute; width: 1px; height: 1px; opacity: 0.001; pointer-events: none;">
                    <div id="ytPlayerContainer"></div>
                </div>
                
                <div id="coverFallback" class="absolute inset-0 flex flex-col items-center justify-center bg-[#181818] text-gray-500 pointer-events-none z-10">
                    <i class="fa-solid fa-music text-2xl md:text-4xl mb-2 text-[#1DB954]"></i>
                    <p class="text-xs font-medium px-4 text-center text-gray-400" id="currentDisplayTitle">Scegli un beat per iniziare</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="footerControls" class="bg-[#181818] border-t border-[#282828] px-4 pt-4 pb-6 flex flex-col items-center shrink-0 z-50 select-none relative">
        
        <div id="swipeTitleContainer" class="w-full text-center py-2 mb-2 cursor-grab active:cursor-grabbing bg-transparent select-none">
            <div class="marquee-wrapper mx-auto max-w-xl pointer-events-none">
                <div id="marqueeContent" class="marquee-content">
                    <span id="playerTrackTitle" class="text-sm md:text-base font-bold text-white">Scegli un beat</span>
                    <span id="playerTrackChannel" class="text-xs text-gray-400 ml-3 font-normal">Nessun canale</span>
                </div>
            </div>
        </div>

        <div class="w-full flex items-center space-x-3 text-xs text-gray-400 mb-4 max-w-2xl relative">
            <span id="currentTime" class="w-9 text-left select-none">0:00</span>
            
            <div class="flex-1 bg-[#4d4d4d] h-4 rounded-full relative cursor-pointer py-1" id="progressBarContainer">
                <div class="bg-[#333] w-full h-2 rounded-full absolute top-1 left-0"></div>
                <div class="bg-[#1DB954] h-2 rounded-full w-0 absolute top-1 left-0 transition-all duration-100" id="progressBar"></div>
                
                <div id="progressTooltip" class="hidden absolute bottom-full mb-2 bg-[#1DB954] text-black font-bold text-[11px] px-2 py-0.5 rounded shadow-md pointer-events-none transform -translate-x-1/2 z-50">
                    0:00
                </div>
            </div>
            
            <span id="durationTime" class="w-9 text-right select-none">0:00</span>
        </div>

        <div class="flex items-center justify-center space-x-6 md:hidden w-full">
            <button id="mobileBack10Btn" class="text-gray-400 active:text-white text-base p-2"><i class="fa-solid fa-arrow-rotate-left"></i> 10</button>
            <button id="mobilePrevBtn" class="text-gray-400 active:text-white text-xl p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="mobilePlayPauseBtn" class="bg-white text-black w-14 h-14 rounded-full flex items-center justify-center active:scale-95 text-xl pl-0.5 shadow-lg">
                <i class="fa-solid fa-play" id="mobilePlayIcon"></i>
            </button>
            <button id="mobileNextBtn" class="text-gray-400 active:text-white text-xl p-2"><i class="fa-solid fa-forward-step"></i></button>
            <button id="mobileForward10Btn" class="text-gray-400 active:text-white text-base p-2">10 <i class="fa-solid fa-arrow-rotate-right"></i></button>
        </div>

        <div class="hidden md:flex items-center justify-center space-x-8 w-full">
            <button id="back10Btn" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center space-x-1 p-2" title="-10 Secondi"><i class="fa-solid fa-arrow-rotate-left"></i> <span>10s</span></button>
            <button id="prevBtn" class="text-gray-400 hover:text-white transition-colors text-2xl p-2"><i class="fa-solid fa-backward-step"></i></button>
            <button id="playPauseBtn" class="bg-white text-black w-14 h-14 rounded-full flex items-center justify-center hover:scale-105 transition-transform text-xl pl-0.5 shadow-md">
                <i class="fa-solid fa-play" id="playIcon"></i>
            </button>
            <button id="nextBtn" class="text-gray-400 hover:text-white transition-colors text-2xl p-2"><i class="fa-solid fa-forward-step"></i></button>
            <button id="forward10Btn" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center space-x-1 p-2" title="+10 Secondi"><span>10s</span> <i class="fa-solid fa-arrow-rotate-right"></i></button>
            
            <div class="w-6"></div>
            <div class="flex items-center space-x-2 text-gray-400">
                <i class="fa-solid fa-volume-high text-base"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" 
                    class="w-28 h-1.5 bg-[#4d4d4d] rounded-full appearance-none cursor-pointer accent-white">
            </div>
        </div>
    </footer>

    <script>
        let appState = {
            tracks: [],
            currentIndex: -1,
            isPlaying: false
        };
        let deferredPrompt;

        let startX = 0, currentX = 0, isDragging = false;
        let isScrubbing = false; 
        let scrubPercentage = 0;
        
        const swipeTitle = document.getElementById('swipeTitleContainer');
        const marqueeContent = document.getElementById('marqueeContent');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressTooltip = document.getElementById('progressTooltip');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            if (document.getElementById('pwaInstallBtn')) document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        // Iniezione Iframe API Ufficiale
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(document.getElementById('volumeSlider')?.value || 100);
            startProgressLoop();
            setupMediaSessionHandlers();
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon'), mobilePlayIcon = document.getElementById('mobilePlayIcon');
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                if(playIcon) playIcon.className = "fa-solid fa-pause";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-pause";
                updateDuration(); updateMediaSessionState(true);
            } else {
                appState.isPlaying = false;
                if(playIcon) playIcon.className = "fa-solid fa-play pl-0.5";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-play";
                updateMediaSessionState(false);
                if (event.data == YT.PlayerState.ENDED) nextTrack();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.remove('hidden');
            
            // Carica la chiave salvata in precedenza se presente
            const savedKey = localStorage.getItem('youtube_api_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;

            document.getElementById('searchBtn').addEventListener('click', () => performSearch());
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
            
            // Gestione Menu API Key
            document.getElementById('apiSettingsBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('apiMenu').classList.toggle('hidden');
            });
            document.addEventListener('click', () => document.getElementById('apiMenu').classList.add('hidden'));
            document.getElementById('apiMenu').addEventListener('click', (e) => e.stopPropagation());

            document.getElementById('saveApiKeyBtn').addEventListener('click', () => {
                const key = document.getElementById('apiKeyInput').value.trim();
                if (key) {
                    localStorage.setItem('youtube_api_key', key);
                    alert("API Key salvata con successo! Ora puoi effettuare ricerche senza blocchi.");
                    document.getElementById('apiMenu').classList.add('hidden');
                } else {
                    localStorage.removeItem('youtube_api_key');
                    alert("Chiave rimossa.");
                }
            });

            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('nextBtn').addEventListener('click', nextTrack);
            document.getElementById('back10Btn').addEventListener('click', () => jumpSeconds(-10));
            document.getElementById('forward10Btn').addEventListener('click', () => jumpSeconds(10));

            document.getElementById('mobilePlayPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('mobilePrevBtn').addEventListener('click', prevTrack);
            document.getElementById('mobileNextBtn').addEventListener('click', nextTrack);
            document.getElementById('mobileBack10Btn').addEventListener('click', () => jumpSeconds(-10));
            document.getElementById('mobileForward10Btn').addEventListener('click', () => jumpSeconds(10));
            
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => player?.setVolume(e.target.value));
            
            progressBarContainer.addEventListener('mousedown', startScrub);
            progressBarContainer.addEventListener('touchstart', startScrub, { passive: false });

            window.addEventListener('mousemove', moveScrub);
            window.addEventListener('touchmove', moveScrub, { passive: false });

            window.addEventListener('mouseup', endScrub);
            window.addEventListener('touchend', endScrub);

            swipeTitle.addEventListener('touchstart', dragStart, { passive: true });
            swipeTitle.addEventListener('touchmove', dragMove, { passive: false });
            swipeTitle.addEventListener('touchend', dragEnd, { passive: true });

            swipeTitle.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);
        });

        function getClientX(e) {
            if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
            return e.clientX;
        }

        function updateScrubPosition(e) {
            const rect = progressBarContainer.getBoundingClientRect();
            const clientX = getClientX(e);
            let offsetX = clientX - rect.left;
            offsetX = Math.max(0, Math.min(offsetX, rect.width));
            scrubPercentage = offsetX / rect.width;

            const duration = player.getDuration() || 0;
            const targetTime = duration * scrubPercentage;

            progressBar.style.width = `${scrubPercentage * 100}%`;
            document.getElementById('currentTime').innerText = formatTime(targetTime);

            let relativeLeft = clientX - rect.left;
            relativeLeft = Math.max(0, Math.min(relativeLeft, rect.width));
            progressTooltip.innerText = formatTime(targetTime);
            progressTooltip.style.left = `${relativeLeft}px`;
            progressTooltip.classList.remove('hidden');
        }

        function startScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            progressBar.classList.add('scrubbing');
            updateScrubPosition(e);
        }

        function moveScrub(e) {
            if (!isScrubbing) return;
            if (e.cancelable) e.preventDefault();
            updateScrubPosition(e);
        }

        function endScrub(e) {
            if (!isScrubbing) return;
            isScrubbing = false;
            progressBar.classList.remove('scrubbing');
            progressTooltip.classList.add('hidden');

            const duration = player.getDuration() || 0;
            player.seekTo(duration * scrubPercentage, true);
        }

        function dragStart(e) {
            isDragging = true;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            swipeTitle.classList.add('dragging');
            marqueeContent.classList.remove('animate-marquee');
        }

        function dragMove(e) {
            if (!isDragging) return;
            currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
            const opacity = Math.max(0.2, 1 - Math.abs(currentX) / 350);
            swipeTitle.style.transform = `translate3d(${currentX}px, 0, 0)`;
            swipeTitle.style.opacity = opacity;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            swipeTitle.classList.remove('dragging');

            const threshold = 75;
            if (currentX > threshold) {
                animateOutAndChange('right');
            } else if (currentX < -threshold) {
                animateOutAndChange('left');
            } else {
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
                checkAndApplyMarquee();
            }
            currentX = 0;
        }

        function animateOutAndChange(direction) {
            swipeTitle.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
            swipeTitle.style.transform = `translate3d(${direction === 'right' ? '100%' : '-100%'}, 0, 0)`;
            swipeTitle.style.opacity = '0';
            setTimeout(() => {
                if (direction === 'right') prevTrack(); else nextTrack();
                swipeTitle.style.transition = 'none';
                swipeTitle.style.transform = `translate3d(${direction === 'right' ? '-100%' : '100%'}, 0, 0)`;
                swipeTitle.offsetHeight;
                swipeTitle.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-out';
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
            }, 200);
        }

        function checkAndApplyMarquee() {
            marqueeContent.classList.remove('animate-marquee');
            const wrapper = swipeTitle.querySelector('.marquee-wrapper');
            const cleanText = `<span id="playerTrackTitle" class="text-sm md:text-base font-bold text-white">${document.getElementById('playerTrackTitle').innerText}</span><span id="playerTrackChannel" class="text-xs text-gray-400 ml-3 font-normal">${document.getElementById('playerTrackChannel').innerText}</span>`;
            marqueeContent.innerHTML = cleanText;

            if (marqueeContent.scrollWidth > wrapper.clientWidth) {
                marqueeContent.innerHTML += "<span class='inline-block w-16'></span>" + cleanText;
                marqueeContent.classList.add('animate-marquee');
            }
        }

        /* RICERCA STABILE ATTRAVERSO LA CHIAVE API DI GOOGLE (ZERO ERRORI CORS) */
        async function performSearch() {
            const apiKey = localStorage.getItem('youtube_api_key');
            const placeholderText = document.getElementById('placeholderText');

            if (!apiKey) {
                alert("Attenzione: Inserisci la tua YouTube API Key cliccando sull'icona dell'ingranaggio in alto a destra per sbloccare la ricerca.");
                if (placeholderText) placeholderText.innerText = "Configura l'API Key (icona ingranaggio) per cercare i tuoi beat.";
                return;
            }

            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            if (placeholderText) placeholderText.innerText = "Connessione diretta a YouTube in corso...";
            appState.tracks = []; 
            appState.currentIndex = -1;

            try {
                // Chiamata standard senza proxy intermediari, sicura al 100% e priva di problemi CORS
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&key=${apiKey}`;
                
                const response = await fetch(url);
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData?.error?.message || "Errore API");
                }
                
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    if (placeholderText) placeholderText.innerText = "Nessun beat trovato. Modifica i termini di ricerca.";
                    return;
                }

                appState.tracks = data.items.map(item => ({
                    id: item.id.videoId,
                    title: item.snippet.title,
                    channel: item.snippet.channelTitle,
                    thumbnail: item.snippet.thumbnails?.medium?.url || `https://img.youtube.com/vi/${item.id.videoId}/mqdefault.jpg`
                }));

                renderTracklist();
            } catch (error) {
                console.error(error);
                if (placeholderText) placeholderText.innerText = "Errore della chiave. Verifica di aver inserito una chiave corretta ed attiva.";
                alert("Errore durante la ricerca: " + error.message);
            }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; trackListDiv.innerHTML = '';
            
            if (appState.tracks.length === 0) {
                trackListDiv.innerHTML = '<p class="text-gray-500 text-sm p-2 italic text-center">Nessun risultato.</p>';
                return;
            }

            appState.tracks.forEach((track, index) => {
                const trackRow = document.createElement('div');
                trackRow.id = `track-row-${index}`;
                trackRow.className = `flex items-center p-2 rounded active:bg-[#282828] md:hover:bg-[#282828] cursor-pointer transition-colors ${appState.currentIndex === index ? 'bg-[#1a1a1a]' : ''}`;
               
                trackRow.innerHTML = `
                    <div class="w-6 text-gray-400 text-xs text-center">${index + 1}</div>
                    <img src="${track.thumbnail}" class="w-9 h-9 object-cover rounded mx-2.5">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-medium truncate ${appState.currentIndex === index ? 'text-[#1DB954]' : 'text-white'}">${track.title}</p>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">${track.channel}</p>
                    </div>
                `;
                trackRow.addEventListener('click', () => {
                    loadTrack(index);
                });
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            if (appState.currentIndex !== -1) {
                const oldRow = document.getElementById(`track-row-${appState.currentIndex}`);
                if (oldRow) {
                    oldRow.classList.remove('bg-[#1a1a1a]');
                    const oldText = oldRow.querySelector('p.text-xs');
                    if (oldText) { oldText.classList.remove('text-[#1DB954]'); oldText.classList.add('text-white'); }
                }
            }

            appState.currentIndex = index;
            const track = appState.tracks[index];

            document.getElementById('playerTrackTitle').innerText = track.title;
            document.getElementById('playerTrackChannel').innerText = track.channel;
            document.getElementById('currentDisplayTitle').innerText = track.title;

            const newRow = document.getElementById(`track-row-${index}`);
            if (newRow) {
                newRow.classList.add('bg-[#1a1a1a]');
                const newText = newRow.querySelector('p.text-xs');
                if (newText) { newText.classList.remove('text-white'); newText.classList.add('text-[#1DB954]'); }
            }

            if (player?.loadVideoById) player.loadVideoById(track.id);
            checkAndApplyMarquee();
            updateMediaSessionMetadata(track);
        }

        function updateMediaSessionMetadata(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.channel, album: 'YouTubette Beats',
                    artwork: [{ src: track.thumbnail, sizes: '320x180', type: 'image/jpeg' }]
                });
            }
        }

        function updateMediaSessionState(isPlaying) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
        }

        function setupMediaSessionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let nextIdx = (appState.currentIndex + 1) % appState.tracks.length;
            loadTrack(nextIdx);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let prevIdx = appState.currentIndex - 1;
            if (prevIdx < 0) prevIdx = appState.tracks.length - 1;
            loadTrack(prevIdx);
        }

        function jumpSeconds(seconds) {
            if (!player?.getCurrentTime || appState.currentIndex === -1) return;
            let targetTime = player.getCurrentTime() + seconds;
            player.seekTo(Math.max(0, Math.min(targetTime, player.getDuration())), true);
        }

        function startProgressLoop() {
            setInterval(() => {
                if (player?.getCurrentTime && appState.isPlaying && !isScrubbing) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        progressBar.style.width = `${(currentTime / duration) * 100}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                    }
                }
            }, 500);
        }

        function updateDuration() {
            if (player?.getDuration) document.getElementById('durationTime').innerText = formatTime(player.getDuration());
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
