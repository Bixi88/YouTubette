<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette Hardware Mode</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Font Originale Microsoft Zune */
        @font-face {
            font-family: 'ZuneSegoe';
            src: local('Segoe UI Semibold'), local('SegoeUI-Semibold'), local('Segoe UI');
        }

        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #121212;
            background: radial-gradient(circle, #2c2c2c 0%, #0f0f0f 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Effetti Hardware Comuni */
        .hardware-container {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255,255,255,0.1);
            user-select: none;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lcd-screen {
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }

        /* Animazione Bobine HiFi */
        .hifi-reels-playing {
            animation: spinReels 2.5s linear infinite;
        }
        @keyframes spinReels {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Nascondi scrollbar negli schermi dei dispositivi */
        .screen-scroll::-webkit-scrollbar { display: none; }
        .screen-scroll { -ms-overflow-style: none; scroll-bar-width: none; }

        /* Stile di selezione all'interno degli schermi OS vecchi */
        .pod-selected {
            background: #0ea5e9 !important;
            color: white !important;
        }
        .zune-selected {
            background: #f97316 !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div id="deviceWrapper" class="hardware-container">
        </div>

    <div class="absolute opacity-0 pointer-events-none w-1 h-1" id="ytPlayerContainer"></div>

    <button onclick="openSkinSelector()" class="fixed bottom-4 right-4 bg-white/10 hover:bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md transition-all shadow-lg active:scale-95 z-50">
        <i class="fa-solid fa-layer-group text-base"></i>
    </button>

    <div id="skinSelectorModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm p-4">
        <div class="bg-[#1e1e1e] border border-neutral-800 p-5 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-sm font-bold text-neutral-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-palette mr-2"></i> Cambia Dispositivo</h3>
            <div class="space-y-2">
                <button onclick="setSkin('classicPod')" class="w-full bg-neutral-800 hover:bg-neutral-700 text-left px-4 py-3 rounded-xl font-medium text-sm flex justify-between items-center">iPod Classic (Silver) <i class="fa-solid fa-circle text-sky-500 text-[10px]"></i></button>
                <button onclick="setSkin('microsoftZune')" class="w-full bg-neutral-800 hover:bg-neutral-700 text-left px-4 py-3 rounded-xl font-medium text-sm flex justify-between items-center">Microsoft Zune (Slate Blue) <i class="fa-solid fa-circle text-orange-500 text-[10px]"></i></button>
                <button onclick="setSkin('zuneHybrid')" class="w-full bg-neutral-800 hover:bg-neutral-700 text-left px-4 py-3 rounded-xl font-medium text-sm flex justify-between items-center">Zune-Pod Hybrid (Magenta) <i class="fa-solid fa-circle text-magenta-500 text-[10px]"></i></button>
                <button onclick="setSkin('hiFiRecorder')" class="w-full bg-neutral-800 hover:bg-neutral-700 text-left px-4 py-3 rounded-xl font-medium text-sm flex justify-between items-center">Hi-Fi Studio Deck <i class="fa-solid fa-circle text-red-500 text-[10px]"></i></button>
            </div>
            
            <div class="mt-4 pt-3 border-t border-neutral-800">
                <label class="block text-[10px] uppercase font-bold text-neutral-500 mb-1.5">YouTube API Key</label>
                <input type="text" id="globalApiKey" placeholder="Inserisci API Key per sbloccare la ricerca" class="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-neutral-600">
            </div>

            <button onclick="closeSkinSelector()" class="w-full mt-4 bg-white text-black font-bold text-xs py-2 rounded-xl active:scale-95 transition-transform">Conferma e Chiudi</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE STATO
        let appState = {
            currentSkin: localStorage.getItem('hw_skin') || 'classicPod',
            apiKey: localStorage.getItem('youtubette_api_key') || '',
            tracks: [],
            currentIndex: -1,
            isPlaying: false,
            currentMenuSection: 'home', // home, search_input, tracks, player
            selectedMenuIndex: 0
        };

        // YOUTUBE PLAYER INTEGRATION
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '1px', width: '1px', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0 },
                events: { 'onReady': () => startProgressInterval(), 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                updateHardwareScreen();
                toggleReelsAnim(true);
            } else {
                appState.isPlaying = false;
                updateHardwareScreen();
                toggleReelsAnim(false);
                if (event.data == YT.PlayerState.ENDED) nextTrack();
            }
        }

        // STRUTTURE DELLE INTERFACCE HARDWARE (RENDER TOTALMENTE INTEGRATO)
        const skins = {
            classicPod: {
                render: () => `
                    <div class="w-[340px] h-[540px] bg-[#e2e8f0] rounded-[38px] p-5 flex flex-col justify-between items-center border border-gray-400 shadow-2xl relative" style="background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);">
                        
                        <div class="w-full h-[190px] bg-[#cbd5e1] rounded-lg border-2 border-[#94a3b8] p-3 flex flex-col justify-between text-black lcd-screen font-sans">
                            <div class="flex justify-between items-center text-[10px] font-bold border-b border-slate-400 pb-1 text-slate-700">
                                <span><i class="fa-solid fa-radio"></i> YouTubette</span>
                                <span id="podBattery"><i class="fa-solid fa-battery-full"></i></span>
                            </div>
                            
                            <div id="podInternalScreen" class="flex-1 text-xs py-1 flex flex-col justify-start overflow-hidden">
                                </div>

                            <div id="podScreenTimeline" class="hidden text-[10px] font-mono border-t border-slate-400 pt-1">
                                <div class="flex justify-between items-center">
                                    <span id="podTimeCurrent">0:00</span>
                                    <div class="flex-1 mx-2 h-1.5 bg-slate-300 rounded relative overflow-hidden">
                                        <div id="podTimeBar" class="h-full bg-slate-800 w-0"></div>
                                    </div>
                                    <span id="podTimeTotal">0:00</span>
                                </div>
                            </div>
                        </div>

                        <div class="w-56 h-56 rounded-full bg-white border border-gray-300 relative flex items-center justify-center shadow-inner select-none active:scale-98 transition-transform">
                            <button onclick="hwAction('menu')" class="absolute top-3 font-black text-xs text-gray-400 hover:text-slate-800 tracking-wider">MENU</button>
                            <button onclick="hwAction('next')" class="absolute right-4 text-xs text-gray-400 hover:text-slate-800"><i class="fa-solid fa-forward"></i></button>
                            <button onclick="hwAction('prev')" class="absolute left-4 text-xs text-gray-400 hover:text-slate-800"><i class="fa-solid fa-backward"></i></button>
                            <button onclick="hwAction('play')" class="absolute bottom-3 text-xs text-gray-400 hover:text-slate-800"><i class="fa-solid fa-play"></i><i class="fa-solid fa-pause ml-0.5"></i></button>
                            
                            <button onclick="hwAction('select')" class="w-18 h-18 rounded-full bg-gray-200 border border-gray-300 shadow-md hover:bg-gray-300 active:scale-95 transition-transform flex items-center justify-center text-slate-500">
                                <i class="fa-solid fa-circle text-[8px] opacity-20"></i>
                            </button>
                        </div>

                        <div class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">Click Wheel</div>
                    </div>
                `
            },
            microsoftZune: {
                render: () => `
                    <div class="w-[330px] h-[550px] bg-[#241f1c] rounded-[24px] p-4 flex flex-col justify-between items-center border border-[#3e342f] shadow-2xl relative" style="background: linear-gradient(180deg, #2e2622 0%, #171311 100%);">
                        <div class="absolute inset-0 rounded-[24px] border-2 border-orange-500/10 pointer-events-none"></div>

                        <div class="w-full h-[250px] bg-[#0f0d0c] border border-[#3a302a] p-4 flex flex-col justify-between text-white lcd-screen zune-font-style" style="font-family: 'ZuneSegoe', sans-serif;">
                            <div class="flex justify-between items-center text-[9px] text-orange-500/80 tracking-wider font-bold uppercase pb-1 border-b border-neutral-800">
                                <span><i class="fa-solid fa-music"></i> Zune OS</span>
                                <span>12:00 PM</span>
                            </div>

                            <div id="zuneInternalScreen" class="flex-1 flex flex-col justify-start overflow-hidden py-2">
                                </div>
                        </div>

                        <div class="flex flex-col items-center w-full space-y-4 mb-4">
                            <div class="w-44 h-36 rounded-[28px] bg-[#3a302a] border border-neutral-700/50 relative flex items-center justify-center shadow-lg">
                                <button onclick="hwAction('menu')" class="absolute top-2 text-[10px] font-bold text-orange-500/50 hover:text-orange-500">SU</button>
                                <button onclick="hwAction('next')" class="absolute right-3 text-[10px] font-bold text-orange-500/50 hover:text-orange-500">DX</button>
                                <button onclick="hwAction('prev')" class="absolute left-3 text-[10px] font-bold text-orange-500/50 hover:text-orange-500">SX</button>
                                <button onclick="hwAction('play')" class="absolute bottom-2 text-[10px] font-bold text-orange-500/50 hover:text-orange-500">GIÙ</button>
                                
                                <button onclick="hwAction('select')" class="w-16 h-14 rounded-[14px] bg-[#1a1513] border border-orange-500/20 shadow-inner flex items-center justify-center text-orange-500 hover:bg-neutral-900 active:scale-95 transition-all">
                                    <span class="text-[10px] font-bold tracking-widest">OK</span>
                                </button>
                            </div>

                            <div class="w-44 flex justify-between px-2">
                                <button onclick="hwAction('menu')" class="w-10 h-10 rounded-full bg-[#1a1513] border border-neutral-800 flex items-center justify-center text-xs text-stone-400 active:scale-90 shadow" title="Indietro/Menu"><i class="fa-solid fa-arrow-left"></i></button>
                                <button onclick="hwAction('download')" class="w-10 h-10 rounded-full bg-[#1a1513] border border-orange-600/30 flex items-center justify-center text-xs text-orange-500 active:scale-90 shadow" title="Scarica MP3"><i class="fa-solid fa-arrow-down"></i></button>
                            </div>
                        </div>
                    </div>
                `
            },
            zuneHybrid: {
                render: () => `
                    <div class="w-[330px] h-[550px] bg-[#220a16] rounded-[24px] p-4 flex flex-col justify-between items-center border border-[#4a1231] shadow-2xl relative" style="background: linear-gradient(180deg, #321022 0%, #12040b 100%);">
                        
                        <div class="w-full h-[250px] bg-[#0c0207] border border-[#5c163d] p-4 flex flex-col justify-between text-pink-100 lcd-screen" style="font-family: 'ZuneSegoe', sans-serif;">
                            <div class="flex justify-between items-center text-[9px] text-pink-500 tracking-wider font-bold uppercase pb-1 border-b border-pink-950">
                                <span><i class="fa-solid fa-bolt"></i> Hybrid OS</span>
                                <span id="hybridTime">READY</span>
                            </div>

                            <div id="hybridInternalScreen" class="flex-1 flex flex-col justify-start overflow-hidden py-2"></div>
                        </div>

                        <div class="flex flex-col items-center w-full space-y-4 mb-4">
                            <div class="w-44 h-36 rounded-[28px] bg-[#471630] border border-pink-700/30 relative flex items-center justify-center shadow-lg">
                                <button onclick="hwAction('menu')" class="absolute top-2 text-[10px] font-bold text-pink-400/60">UP</button>
                                <button onclick="hwAction('next')" class="absolute right-3 text-[10px] font-bold text-pink-400/60"><i class="fa-solid fa-caret-right"></i></button>
                                <button onclick="hwAction('prev')" class="absolute left-3 text-[10px] font-bold text-pink-400/60"><i class="fa-solid fa-caret-left"></i></button>
                                <button onclick="hwAction('play')" class="absolute bottom-2 text-[10px] font-bold text-pink-400/60">DOWN</button>
                                
                                <button onclick="hwAction('select')" class="w-16 h-14 rounded-[14px] bg-[#1a050f] border border-pink-500/40 shadow-inner flex items-center justify-center text-pink-400 font-bold text-xs">SELECT</button>
                            </div>

                            <div class="w-44 flex justify-between px-2">
                                <button onclick="hwAction('menu')" class="w-10 h-10 rounded-full bg-[#1a050f] border border-pink-950 flex items-center justify-center text-xs text-pink-400"><i class="fa-solid fa-rotate-left"></i></button>
                                <button onclick="hwAction('download')" class="w-10 h-10 rounded-full bg-[#1a050f] border border-pink-500/40 flex items-center justify-center text-xs text-pink-400" title="Scarica MP3"><i class="fa-solid fa-arrow-down"></i></button>
                            </div>
                        </div>
                    </div>
                `
            },
            hiFiRecorder: {
                render: () => `
                    <div class="w-[520px] h-[340px] bg-[#cfcfcf] rounded shadow-2xl p-4 flex flex-col justify-between border-2 border-[#aaaaaa] text-neutral-800 relative font-mono select-none" style="background: linear-gradient(to bottom, #f0f0f0 0%, #c5c5c5 100%);">
                        
                        <div class="flex justify-between items-center bg-[#b8b8b8] p-2 rounded border border-neutral-400 shadow-inner">
                            <div class="text-xs font-black tracking-widest text-neutral-700"><i class="fa-solid fa-tape"></i> STUDIO CASSETTE DECK</div>
                            
                            <div class="w-40 flex items-end space-x-0.5 h-6 bg-neutral-950 p-1 rounded border border-neutral-700">
                                <div class="vu-bar flex-1 bg-green-500 h-[20%] transition-all duration-150"></div>
                                <div class="vu-bar flex-1 bg-green-500 h-[40%] transition-all duration-150"></div>
                                <div class="vu-bar flex-1 bg-yellow-400 h-[15%] transition-all duration-150"></div>
                                <div class="vu-bar flex-1 bg-red-600 h-[5%] transition-all duration-150"></div>
                            </div>

                            <button onclick="hwAction('download')" class="w-7 h-7 rounded-full bg-neutral-800 hover:bg-neutral-900 text-white flex items-center justify-center text-xs shadow border border-neutral-600 active:scale-90 transition-transform" title="Scarica Beat MP3">
                                <i class="fa-solid fa-arrow-down"></i>
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-4 my-2 flex-1 items-stretch">
                            
                            <div class="border-2 border-neutral-700 bg-neutral-900 rounded p-3 flex flex-col justify-between items-center relative shadow-inner">
                                <div class="absolute top-1 left-2 text-[7px] text-neutral-500 uppercase tracking-widest">Mechanical System</div>
                                
                                <div class="flex justify-center items-center space-x-12 my-auto">
                                    <div id="hifiReelLeft" class="w-12 h-12 rounded-full border-4 border-dashed border-neutral-600 flex items-center justify-center"><div class="w-3 h-3 bg-neutral-900 rounded-full"></div></div>
                                    <div id="hifiReelRight" class="w-12 h-12 rounded-full border-4 border-dashed border-neutral-600 flex items-center justify-center"><div class="w-3 h-3 bg-neutral-900 rounded-full"></div></div>
                                </div>

                                <div id="hifiTapeLabel" class="text-[9px] text-amber-500 bg-amber-950/40 px-2 py-0.5 border border-amber-900/30 rounded w-full text-center truncate uppercase">TAPE EMPTY</div>
                            </div>

                            <div class="bg-emerald-950 text-emerald-400 border-2 border-neutral-600 p-2.5 rounded flex flex-col justify-between lcd-screen font-mono shadow-inner">
                                <div class="text-[8px] text-emerald-500 border-b border-emerald-900/40 pb-0.5 uppercase tracking-wider flex justify-between">
                                    <span>System LCD</span>
                                    <span id="hifiTrackCounter">TR 00</span>
                                </div>
                                
                                <div id="hifiInternalScreen" class="flex-1 text-[10px] py-1 flex flex-col justify-start overflow-hidden">
                                    </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-7 gap-1.5 pt-2 border-t border-neutral-400">
                            <button onclick="hwAction('menu')" class="bg-neutral-700 text-white border-b-4 border-neutral-900 active:border-b-0 py-2 font-bold text-xs rounded shadow uppercase tracking-tighter">Menu/Su</button>
                            <button onclick="hwAction('select')" class="bg-neutral-700 text-white border-b-4 border-neutral-900 active:border-b-0 py-2 font-bold text-xs rounded shadow uppercase tracking-tighter">Sel/Giù</button>
                            <button onclick="hwAction('prev')" class="bg-neutral-600 text-neutral-200 border-b-4 border-neutral-900 active:border-b-0 py-2 font-bold text-xs rounded shadow uppercase tracking-tighter">Prev</button>
                            <button onclick="hwAction('skipMinus10')" class="bg-stone-500 text-white border-b-4 border-stone-800 active:border-b-0 py-2 font-bold text-xs rounded shadow">-10s</button>
                            <button onclick="hwAction('play')" class="bg-red-700 text-white border-b-4 border-red-950 active:border-b-0 py-2 font-bold text-xs rounded shadow uppercase tracking-wider">Play</button>
                            <button onclick="hwAction('skipPlus10')" class="bg-stone-500 text-white border-b-4 border-stone-800 active:border-b-0 py-2 font-bold text-xs rounded shadow">+10s</button>
                            <button onclick="hwAction('next')" class="bg-neutral-600 text-neutral-200 border-b-4 border-neutral-900 active:border-b-0 py-2 font-bold text-xs rounded shadow uppercase tracking-tighter">Next</button>
                        </div>
                    </div>
                `
            }
        };

        // INIZIALIZZAZIONE APPLICAZIONE
        document.addEventListener('DOMContentLoaded', () => {
            applicaHardware();
            
            // Monitora l'input della chiave API salvandola
            const apiKeyInput = document.getElementById('globalApiKey');
            if (apiKeyInput) {
                apiKeyInput.value = appState.apiKey;
                apiKeyInput.addEventListener('input', (e) => {
                    appState.apiKey = e.target.value.trim();
                    localStorage.setItem('youtubette_api_key', appState.apiKey);
                });
            }
        });

        function applicaHardware() {
            const wrapper = document.getElementById('deviceWrapper');
            const targetSkin = skins[appState.currentSkin] || skins.classicPod;
            wrapper.innerHTML = targetSkin.render();
            updateHardwareScreen();
        }

        // LOGICA DI CONTROLLO DELLO SCHERMO INTERNO AI DISPOSITIVI
        function updateHardwareScreen() {
            const podScreen = document.getElementById('podInternalScreen');
            const zuneScreen = document.getElementById('zuneInternalScreen');
            const hybridScreen = document.getElementById('hybridInternalScreen');
            const hifiScreen = document.getElementById('hifiInternalScreen');

            let contentHtml = "";

            // Generazione del contenuto logico in base alla schermata dell'OS simulato
            if (appState.currentMenuSection === 'home') {
                contentHtml = `
                    <div class="font-bold border-b border-current pb-1 mb-1 text-center uppercase tracking-wide text-[10px]">Menu Principale</div>
                    <div class="px-1 py-0.5 ${appState.selectedMenuIndex === 0 ? 'pod-selected zune-selected rounded' : ''}">🔍 Cerca Beat (Digita)</div>
                    <div class="px-1 py-0.5 ${appState.selectedMenuIndex === 1 ? 'pod-selected zune-selected rounded' : ''}">📂 Lista Brani (${appState.tracks.length})</div>
                    <div class="px-1 py-0.5 ${appState.selectedMenuIndex === 2 ? 'pod-selected zune-selected rounded' : ''}">🎵 Player in esecuzione</div>
                `;
            } else if (appState.currentMenuSection === 'search_input') {
                contentHtml = `
                    <div class="font-bold mb-2 uppercase text-[10px]">Tastiera Ricerca</div>
                    <p class="text-[10px] opacity-70 mb-1">Premi OK o SELEZIONA per avviare il prompt di digitazione PC/Mobile:</p>
                    <div class="bg-black/20 p-2 rounded border border-current/20 text-center font-bold">👉 CLICCA QUI PER DIGITARE</div>
                `;
            } else if (appState.currentMenuSection === 'tracks') {
                contentHtml = `<div class="font-bold border-b border-current/20 pb-0.5 mb-1 text-[10px] uppercase">Risultati della ricerca:</div>`;
                if (appState.tracks.length === 0) {
                    contentHtml += `<div class="p-2 italic opacity-60 text-center">Nessun beat. Torna al menu e fai una ricerca.</div>`;
                } else {
                    contentHtml += `<div class="screen-scroll overflow-y-auto flex-1 space-y-0.5">`;
                    appState.tracks.forEach((t, i) => {
                        const isSel = appState.selectedMenuIndex === i;
                        contentHtml += `<div class="truncate px-1 py-0.5 text-[11px] rounded ${isSel ? 'pod-selected zune-selected font-bold' : ''}">${i+1}. ${t.title}</div>`;
                    });
                    contentHtml += `</div>`;
                }
            } else if (appState.currentMenuSection === 'player') {
                if (appState.currentIndex === -1) {
                    contentHtml = `<div class="my-auto text-center opacity-60 italic">Nessun brano in riproduzione.<br>Scegli un beat dalla lista.</div>`;
                } else {
                    const t = appState.tracks[appState.currentIndex];
                    contentHtml = `
                        <div class="text-center font-bold text-[11px] uppercase tracking-wider text-orange-500/90 custom-text-accent truncate mb-1">${appState.isPlaying ? '▶ IN RIPRODUZIONE' : '❚❚ IN PAUSA'}</div>
                        <div class="font-bold truncate text-center text-xs px-1" style="white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${t.title}</div>
                        <div class="text-[10px] opacity-70 text-center mt-1 truncate">Canale: ${t.channel}</div>
                    `;
                }
            }

            // Inietta i dati nello schermo del dispositivo attualmente visualizzato
            if (podScreen) {
                podScreen.innerHTML = contentHtml;
                const timeline = document.getElementById('podScreenTimeline');
                if (timeline) timeline.style.display = appState.currentMenuSection === 'player' ? 'block' : 'none';
            }
            if (zuneScreen) zuneScreen.innerHTML = contentHtml;
            if (hybridScreen) hybridScreen.innerHTML = contentHtml;
            if (hifiScreen) {
                hifiScreen.innerHTML = contentHtml;
                const counter = document.getElementById('hifiTrackCounter');
                if (counter) counter.innerText = appState.currentIndex !== -1 ? `TR ${appState.currentIndex + 1 < 10 ? '0' : ''}${appState.currentIndex + 1}` : 'TR 00';
            }

            // Aggiorna anche l'estetica della cassetta dell'HiFi se presente
            const tapeLabel = document.getElementById('hifiTapeLabel');
            if (tapeLabel) {
                if (appState.currentIndex !== -1) {
                    tapeLabel.innerText = appState.tracks[appState.currentIndex].title.substring(0, 20).toUpperCase();
                } else {
                    tapeLabel.innerText = "TAPE READY";
                }
            }
        }

        // AZIONI HARDWARE CORRISPONDENTI AI TASTI FISICI DEI DISPOSITIVI
        function hwAction(actionType) {
            // --- TASTO MENU / BACK ---
            if (actionType === 'menu') {
                if (appState.currentMenuSection !== 'home') {
                    appState.currentMenuSection = 'home';
                    appState.selectedMenuIndex = 0;
                }
            }
            
            // --- DIREZIONE SU / PREV (NAVIGAZIONE INTERNA SCHERMO O TRACCIA PRECEDENTE) ---
            else if (actionType === 'prev') {
                if (appState.currentMenuSection === 'home') {
                    appState.selectedMenuIndex = (appState.selectedMenuIndex - 1 + 3) % 3;
                } else if (appState.currentMenuSection === 'tracks' && appState.tracks.length > 0) {
                    appState.selectedMenuIndex = (appState.selectedMenuIndex - 1 + appState.tracks.length) % appState.tracks.length;
                } else if (appState.currentMenuSection === 'player') {
                    prevTrack();
                }
            }

            // --- DIREZIONE GIÙ / NEXT (NAVIGAZIONE INTERNA SCHERMO O TRACCIA SUCCESSIVA) ---
            else if (actionType === 'next') {
                if (appState.currentMenuSection === 'home') {
                    appState.selectedMenuIndex = (appState.selectedMenuIndex + 1) % 3;
                } else if (appState.currentMenuSection === 'tracks' && appState.tracks.length > 0) {
                    appState.selectedMenuIndex = (appState.selectedMenuIndex + 1) % appState.tracks.length;
                } else if (appState.currentMenuSection === 'player') {
                    nextTrack();
                }
            }

            // --- TASTO CENTRAL SELEZIONA / OK ---
            else if (actionType === 'select') {
                if (appState.currentMenuSection === 'home') {
                    if (appState.selectedMenuIndex === 0) {
                        appState.currentMenuSection = 'search_input';
                        setTimeout(() => triggerSearchPrompt(), 200);
                    } else if (appState.selectedMenuIndex === 1) {
                        appState.currentMenuSection = 'tracks';
                        appState.selectedMenuIndex = 0;
                    } else if (appState.selectedMenuIndex === 2) {
                        appState.currentMenuSection = 'player';
                    }
                } else if (appState.currentMenuSection === 'search_input') {
                    triggerSearchPrompt();
                } else if (appState.currentMenuSection === 'tracks' && appState.tracks.length > 0) {
                    loadTrack(appState.selectedMenuIndex);
                    appState.currentMenuSection = 'player';
                }
            }

            // --- TASTO RIPRODUCI / PAUSA FISICO ---
            else if (actionType === 'play') {
                togglePlay();
            }

            // --- TASTO SCARICA MP3 (INTEGRATO) ---
            else if (actionType === 'download') {
                redirectToDownload();
            }

            // --- SALTO SECONDI EXTRA HI-FI ---
            else if (actionType === 'skipPlus10') { skipSeconds(10); }
            else if (actionType === 'skipMinus10') { skipSeconds(-10); }

            updateHardwareScreen();
        }

        // PROMPT DI RICERCA TOTALMENTE INTEGRATO
        function triggerSearchPrompt() {
            if (!appState.apiKey) {
                alert("Per favore, inserisci la tua YouTube API Key cliccando sul bottone in basso a destra prima di cercare.");
                appState.currentMenuSection = 'home';
                updateHardwareScreen();
                return;
            }
            const query = prompt("Inserisci il genere o il nome del beat da cercare:");
            if (query && query.trim() !== "") {
                executeYouTubeHardwareSearch(query.trim());
            } else {
                appState.currentMenuSection = 'home';
                updateHardwareScreen();
            }
        }

        async function executeYouTubeHardwareSearch(query) {
            appState.tracks = [];
            appState.currentIndex = -1;
            
            const hifiScreen = document.getElementById('hifiInternalScreen');
            const podScreen = document.getElementById('podInternalScreen');
            if(hifiScreen) hifiScreen.innerHTML = "<div class='my-auto text-center animate-pulse'>SEARCHING DECK...</div>";
            if(podScreen) podScreen.innerHTML = "<div class='my-auto text-center animate-pulse'>Connessione...</div>";

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&key=${appState.apiKey}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                appState.tracks = data.items.map(item => ({
                    id: item.id.videoId, 
                    title: item.snippet.title, 
                    channel: item.snippet.channelTitle, 
                    thumbnail: item.snippet.thumbnails.default.url
                }));

                // Sposta l'hardware direttamente nella visualizzazione della lista tracce
                appState.currentMenuSection = 'tracks';
                appState.selectedMenuIndex = 0;
            } catch (error) {
                alert("Errore API: " + error.message);
                appState.currentMenuSection = 'home';
            }
            updateHardwareScreen();
        }

        // MOTOR AUDIO LOGIC
        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            appState.currentIndex = index;
            const track = appState.tracks[index];
            if (player && player.loadVideoById) {
                player.loadVideoById(track.id);
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let n = (appState.currentIndex + 1) % appState.tracks.length;
            loadTrack(n);
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let p = (appState.currentIndex - 1 + appState.tracks.length) % appState.tracks.length;
            loadTrack(p);
        }

        function skipSeconds(secs) {
            if (!player || !player.getCurrentTime) return;
            const cur = player.getCurrentTime();
            player.seekTo(Math.max(0, cur + secs), true);
        }

        // ANIMAZIONI DEI COMPONENTI MECCANICI (CASSETTE REELS E VU METERS)
        function toggleReelsAnim(play) {
            const left = document.getElementById('hifiReelLeft');
            const right = document.getElementById('hifiReelRight');
            if (left && right) {
                if (play) {
                    left.classList.add('hifi-reels-playing');
                    right.classList.add('hifi-reels-playing');
                } else {
                    left.classList.remove('hifi-reels-playing');
                    right.classList.remove('hifi-reels-playing');
                }
            }
        }

        function startProgressInterval() {
            setInterval(() => {
                if (player && player.getCurrentTime && appState.isPlaying) {
                    const cur = player.getCurrentTime();
                    const dur = player.getDuration();
                    if (dur > 0) {
                        const pct = (cur / dur) * 100;
                        // Aggiorna la barra dell'iPod se visibile
                        const podBar = document.getElementById('podTimeBar');
                        const podTimeCur = document.getElementById('podTimeCurrent');
                        const podTimeTot = document.getElementById('podTimeTotal');
                        if (podBar) podBar.style.width = `${pct}%`;
                        if (podTimeCur) podTimeCur.innerText = formatTime(cur);
                        if (podTimeTot) podTimeTot.innerText = formatTime(dur);

                        // Genera oscillazioni casuali per i VU Meter dell'HiFi
                        const vuBars = document.querySelectorAll('.vu-bar');
                        vuBars.forEach(bar => {
                            bar.style.height = `${Math.floor(Math.random() * 90) + 10}%`;
                        });
                    }
                }
            }, 300);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        async function redirectToDownload() {
            if (appState.currentIndex === -1) return;
            const track = appState.tracks[appState.currentIndex];
            const url = `https://www.youtube.com/watch?v=${track.id}`;
            try {
                await navigator.clipboard.writeText(url);
                alert("Link traccia copiato! Ti stiamo reindirizzando al servizio di download.");
                window.open('https://kleger.pl/', '_blank');
            } catch(e) {
                window.open('https://kleger.pl/', '_blank');
            }
        }

        // CONTROLLI POPUP SKIN SELETTORE
        function openSkinSelector() { document.getElementById('skinSelectorModal').classList.remove('hidden'); }
        function closeSkinSelector() { document.getElementById('skinSelectorModal').classList.add('hidden'); }
        function setSkin(skinKey) {
            appState.currentSkin = skinKey;
            localStorage.setItem('hw_skin', skinKey);
            appState.currentMenuSection = 'home';
            appState.selectedMenuIndex = 0;
            applicaHardware();
            closeSkinSelector();
        }
    </script>
</body>
</html>
