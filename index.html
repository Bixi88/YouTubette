<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#1a1a1a" id="metaThemeColor">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #1a1a1a;
            --bg-card: #262626;
            --bg-input: #333333;
            --accent: #f97316;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --is-light: 0;
        }

        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

        .scroll-mask-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            height: 100%;
        }
        .scroll-mask-container::before,
        .scroll-mask-container::after {
            content: "";
            position: absolute;
            left: 0; right: 0;
            height: 24px;
            z-index: 10;
            pointer-events: none;
        }
        .scroll-mask-container::before {
            top: 0;
            background: linear-gradient(to bottom, var(--bg-card) 0%, transparent 100%);
        }
        .scroll-mask-container::after {
            bottom: 0;
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
        }

        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }
        .animate-marquee {
            animation: marqueeLoop 15s linear infinite;
        }
        @keyframes marqueeLoop {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        #swipeTitleContainer {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            touch-action: pan-y;
        }
        #swipeTitleContainer.dragging {
            transition: none !important;
        }
        
        #progressBar.scrubbing {
            transition: none !important;
        }

        .custom-bg-main { background-color: var(--bg-main); }
        .custom-bg-card { background-color: var(--bg-card); }
        .custom-bg-input { background-color: var(--bg-input); }
        .custom-text-accent { color: var(--accent); }
        .custom-bg-accent { background-color: var(--accent); }
        .custom-border-accent { border-color: var(--accent); }
        .custom-text-muted { color: var(--text-muted); }

        .hifi-reels-playing {
            animation: spinReels 3s linear infinite;
        }
        @keyframes spinReels {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .vu-meter-bar {
            transition: height 0.15s ease-in-out;
        }

        /* FONT ORIGINALE LOGICA DI ZUNE (SEGOE UI) */
        .zune-font-style {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif !important;
            letter-spacing: -0.02em;
        }
        
        /* TRANSIZIONE DI LARGHEZZA DINAMICA PER DARE PIÙ SPAZIO ALLA PLAYLIST */
        #mainContentSection {
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #playerSection {
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
    </style>
</head>
<body class="font-sans flex flex-col justify-between hidden p-2 sm:p-3 box-border h-full custom-bg-main">

    <header class="h-16 px-4 flex items-center justify-between rounded-2xl mb-2 shrink-0 z-50 shadow-md custom-bg-card">
        <div class="flex items-center space-x-1.5 text-xl font-bold tracking-tight shrink-0 custom-text-accent">
            <i class="fa-solid fa-radio"></i>
            <span class="hidden sm:inline font-bold ml-1 text-[var(--text-main)]">YouTubette</span>
        </div>
        
        <div class="flex-1 max-w-md mx-4 relative">
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca un beat..." 
                    class="w-full text-sm pl-10 pr-24 py-2 rounded-full border border-transparent focus:outline-none focus:border-[var(--text-main)] transition-all custom-bg-input text-[var(--text-main)]">
                
                <div class="absolute right-1.5 flex items-center space-x-1">
                    <button id="filterToggleBtn" class="text-gray-400 hover:text-[var(--text-main)] p-1.5 text-sm" title="Filtri avanzati">
                        <i class="fa-solid fa-sliders"></i>
                    </button>
                    <button id="searchBtn" class="font-semibold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform custom-bg-accent text-black">
                        Cerca
                    </button>
                </div>
            </div>

            <div id="filterMenu" class="hidden absolute top-full left-0 right-0 mt-2 border rounded-2xl p-4 shadow-2xl z-50 space-y-3 custom-bg-card border-neutral-700/30">
                <p class="text-xs font-bold uppercase tracking-wider mb-1 custom-text-muted">Filtri di Ricerca</p>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[10px] mb-1 custom-text-muted">Ordina per</label>
                        <select id="filterOrder" class="w-full text-xs p-2 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-[var(--text-main)]">
                            <option value="relevance">Rilevanza</option>
                            <option value="date" selected>Data</option>
                            <option value="viewCount">Visualizzazioni</option>
                            <option value="rating">Valutazione</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] mb-1 custom-text-muted">Durata</label>
                        <select id="filterDuration" class="w-full text-xs p-2 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-[var(--text-main)]">
                            <option value="any" selected>Qualsiasi</option>
                            <option value="short">Breve (&lt; 4 min)</option>
                            <option value="medium">Media (4-20 min)</option>
                            <option value="long">Lunga (&gt; 20 min)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] mb-1 custom-text-muted">Caricato in</label>
                        <select id="filterPublishedAfter" class="w-full text-xs p-2 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-[var(--text-main)]">
                            <option value="any" selected>Sempre</option>
                            <option value="hour">Ultima ora</option>
                            <option value="day">Oggi</option>
                            <option value="week">Questa settimana</option>
                            <option value="month">Questo mese</option>
                            <option value="year">Quest'anno</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="shrink-0 flex items-center space-x-1">
            <button id="pwaInstallBtn" class="hidden text-black font-bold text-xs px-3 py-1.5 rounded-full active:scale-95 transition-transform custom-bg-accent">
                <i class="fa-solid fa-download mr-1"></i> Installa
            </button>
            <button id="apiConfigBtn" class="text-gray-400 hover:text-[var(--text-main)] p-2 rounded-full transition-colors w-9 h-9 flex items-center justify-center hover:bg-[var(--bg-input)]" title="Impostazioni">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col-reverse md:flex-row overflow-hidden gap-2 sm:gap-3 mb-2">
        <section id="mainContentSection" class="flex-1 md:w-[68%] p-4 pt-2 flex flex-col rounded-2xl overflow-hidden h-full shadow-md custom-bg-card">
            <div class="scroll-mask-container">
                <div id="trackList" class="space-y-1 pb-6 pt-2 h-full overflow-y-auto">
                    <p id="placeholderText" class="text-xs p-4 italic text-center mt-6 custom-text-muted">Fai una ricerca per caricare i brani.</p>
                </div>
            </div>
        </section>

        <section id="playerSection" class="flex flex-col h-64 md:h-full md:w-[32%] relative shrink-0 md:shrink rounded-2xl overflow-hidden shadow-md custom-bg-card">
            <div class="w-full flex-1 bg-black flex items-center justify-center overflow-hidden relative">
                <div id="ytPlayerContainer" class="w-full h-full absolute inset-0"></div>
                <div id="coverFallback" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 z-10 custom-bg-card">
                    <i class="fa-solid fa-music text-2xl md:text-3xl mb-1"></i>
                    <p class="text-xs font-medium px-4 text-center" id="currentDisplayTitle"></p>
                </div>
            </div>
        </section>
    </main>

    <footer id="footerControls" class="rounded-2xl px-4 pt-1.5 pb-3 flex flex-col items-center shrink-0 z-40 select-none relative shadow-lg custom-bg-card">
        
        <div id="swipeTitleContainer" class="w-full text-center py-1 mb-1 cursor-grab active:cursor-grabbing bg-transparent select-none">
            <div class="marquee-wrapper mx-auto max-w-xl pointer-events-none">
                <div id="marqueeContent" class="marquee-content">
                    <span id="playerTrackTitle" class="text-sm md:text-base font-bold text-[var(--text-main)]">YouTubette</span>
                    <span id="playerTrackChannel" class="text-xs ml-3 font-normal custom-text-muted"></span>
                </div>
            </div>
        </div>

        <div class="w-full flex items-center space-x-3 text-xs mb-2 max-w-2xl relative custom-text-muted">
            <span id="currentTime" class="w-9 text-left select-none">0:00</span>
            
            <div class="flex-1 h-4 rounded-full relative cursor-pointer py-1 bg-neutral-700/40" id="progressBarContainer">
                <div class="w-full h-2 rounded-full absolute top-1 left-0 custom-bg-input"></div>
                <div class="h-2 rounded-full w-0 absolute top-1 left-0 transition-all duration-100 custom-bg-accent" id="progressBar"></div>
                
                <div id="progressTooltip" class="hidden absolute bottom-full mb-2 text-black font-bold text-[11px] px-2 py-0.5 rounded shadow-md pointer-events-none transform -translate-x-1/2 z-50 custom-bg-accent">
                    0:00
                </div>
            </div>
            
            <span id="durationTime" class="w-9 text-right select-none">0:00</span>
        </div>

        <div class="grid grid-cols-3 w-full items-center md:hidden h-10">
            <div></div> 
            <div class="flex items-center justify-center space-x-6 h-full">
                <button id="mobilePrevBtn" class="text-gray-400 active:text-[var(--text-main)] text-lg p-1.5 flex items-center justify-center"><i class="fa-solid fa-backward-step"></i></button>
                <button id="mobilePlayPauseBtn" class="w-10 h-10 min-h-10 max-h-10 min-w-10 max-w-10 rounded-full flex items-center justify-center active:scale-95 text-base shadow-lg shrink-0 bg-[var(--text-main)] text-[var(--bg-main)]">
                    <i class="fa-solid fa-play" id="mobilePlayIcon"></i>
                </button>
                <button id="mobileNextBtn" class="text-gray-400 active:text-[var(--text-main)] text-lg p-1.5 flex items-center justify-center"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="flex justify-end items-center h-full">
                <button id="mobileDownloadBtn" class="text-gray-500 active:text-[var(--accent)] text-lg p-1.5 mr-2 opacity-30 transition-all flex items-center justify-center" title="Scarica MP3" disabled>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </div>

        <div class="hidden md:flex items-center justify-between w-full max-w-3xl px-4">
            <div class="flex items-center space-x-2 w-1/4 justify-start custom-text-muted">
                <i class="fa-solid fa-volume-high text-sm"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" 
                    class="w-24 h-1 rounded-full appearance-none cursor-pointer accent-[var(--text-main)] bg-neutral-600">
            </div>
            
            <div class="flex items-center justify-center space-x-8 w-2/4">
                <button id="prevBtn" class="text-gray-400 hover:text-[var(--text-main)] transition-colors text-xl p-1.5"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playPauseBtn" class="w-11 h-11 rounded-full flex items-center justify-center hover:scale-105 transition-transform text-base pl-0.5 shadow-md bg-[var(--text-main)] text-[var(--bg-main)]">
                    <i class="fa-solid fa-play" id="playIcon"></i>
                </button>
                <button id="nextBtn" class="text-gray-400 hover:text-[var(--text-main)] transition-colors text-xl p-1.5"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            
            <div class="flex items-center w-1/4 justify-end">
                <button id="downloadBtn" class="text-gray-500 hover:text-[var(--text-main)] transition-all text-lg p-1.5 opacity-30 cursor-not-allowed" title="Scarica MP3" disabled>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </div>
    </footer>

    <div id="apiModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="border w-full max-w-md rounded-2xl p-6 shadow-2xl relative custom-bg-card border-neutral-800">
            <h3 class="text-lg font-bold mb-5 flex items-center text-[var(--text-main)]">
                <i class="fa-solid fa-sliders mr-2 custom-text-accent"></i> Impostazioni
            </h3>
            
            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 custom-text-muted">YouTube API Key</label>
                <input type="text" id="modalApiKeyInput" placeholder="Incolla qui la chiave API..." 
                    class="w-full text-sm px-4 py-3 rounded-full border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-[var(--text-main)]">
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 custom-text-muted">Stile Interfaccia (Palette)</label>
                <select id="modalThemeSelect" class="w-full text-sm px-4 py-3 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-[var(--text-main)]">
                </select>
            </div>

            <div class="flex items-center justify-end space-x-3">
                <button id="modalCancelBtn" class="hover:text-[var(--text-main)] font-semibold text-xs px-4 py-2 rounded-full transition-colors custom-text-muted">Annulla</button>
                <button id="modalSaveBtn" class="font-bold text-xs px-5 py-2 rounded-full active:scale-95 transition-all custom-bg-accent text-black">Salva</button>
            </div>
        </div>
    </div>

    <script>
        // LISTA ESCLUSIVA DELLE 4 SKIN RICHIESTE
        const themes = {
            microsoftZune:{ name: "Original Zune (Slate Blue)", bgMain: "#1e1b18", bgCard: "#2e2520", bgInput: "#17120e", accent: "#f97316", textMain: "#ffffff", textMuted: "#a8a29e", isLight: 0 },
            classicPod:   { name: "Classic Pod (iPod Wheel Click)", bgMain: "#d1d5db", bgCard: "#374151", bgInput: "#1f2937", accent: "#0ea5e9", textMain: "#ffffff", textMuted: "#9ca3af", isLight: 0 },
            zuneHybrid:   { name: "Zune-Pod Hybrid (Dark Red / Magenta)", bgMain: "#1c0d12", bgCard: "#2d161e", bgInput: "#12080b", accent: "#d946ef", textMain: "#ffffff", textMuted: "#a21caf", isLight: 0 },
            hiFiRecorder: { name: "Hi-Fi Recorder (Brushed Steel)", bgMain: "#e5e5e5", bgCard: "#b5b5b5", bgInput: "#d4d4d4", accent: "#dc2626", textMain: "#171717", textMuted: "#525252", isLight: 1 }
        };

        let appState = {
            apiKey: localStorage.getItem('youtubette_api_key') || '',
            currentTheme: localStorage.getItem('youtubette_theme') || 'microsoftZune',
            tracks: [],
            currentIndex: -1,
            isPlaying: false
        };
        let deferredPrompt, nextSearchPageToken = '', isFetchingMore = false;

        let startX = 0, currentX = 0, isDragging = false;
        let isScrubbing = false; 
        let scrubPercentage = 0;
        
        const swipeTitle = document.getElementById('swipeTitleContainer');
        const marqueeContent = document.getElementById('marqueeContent');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressTooltip = document.getElementById('progressTooltip');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            if (document.getElementById('pwaInstallBtn')) document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(document.getElementById('volumeSlider')?.value || 100);
            startProgressLoop();
            setupMediaSessionHandlers();
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon'), mobilePlayIcon = document.getElementById('mobilePlayIcon');
            
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                if(playIcon) playIcon.className = "fa-solid fa-pause";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-pause";
                
                // Forza la persistenza visiva dell'hardware nascondendo permanentemente il riquadro video di YouTube
                document.getElementById('coverFallback').style.display = "flex";
                toggleDeviceVisuals(true);
                updateDuration(); updateMediaSessionState(true);
            } else {
                appState.isPlaying = false;
                if(playIcon) playIcon.className = "fa-solid fa-play";
                if(mobilePlayIcon) mobilePlayIcon.className = "fa-solid fa-play";
                updateMediaSessionState(false);
                
                toggleDeviceVisuals(false);
                document.getElementById('coverFallback').style.display = "flex";

                if (event.data == YT.PlayerState.ENDED) {
                    nextTrack();
                }
            }
        }

        function toggleDeviceVisuals(playing) {
            const reels = document.querySelectorAll('.hifi-reel');
            reels.forEach(r => {
                if(playing) r.classList.add('hifi-reels-playing');
                else r.classList.remove('hifi-reels-playing');
            });
            const recDot = document.getElementById('hifiRecDot');
            if (recDot) {
                if (playing) recDot.classList.add('animate-pulse', 'bg-red-600');
                else recDot.classList.remove('animate-pulse');
            }
        }

        // FUNZIONE PER MANDARE AVANTI O INDIETRO DI 10 SECONDI NEI BEAT (TASTI HI-FI)
        function skipSeconds(seconds) {
            if (!player || !player.getCurrentTime) return;
            const currentTime = player.getCurrentTime();
            const duration = player.getDuration() || 0;
            let targetTime = currentTime + seconds;
            if (targetTime < 0) targetTime = 0;
            if (targetTime > duration) targetTime = duration;
            player.seekTo(targetTime, true);
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(appState.currentTheme);
            populateThemeSelect();

            document.body.classList.remove('hidden');
            
            document.getElementById('searchBtn').addEventListener('click', () => performSearch(false));
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(false); });
            
            document.getElementById('filterToggleBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('filterMenu').classList.toggle('hidden');
            });
            document.addEventListener('click', () => document.getElementById('filterMenu').classList.add('hidden'));
            document.getElementById('filterMenu').addEventListener('click', (e) => e.stopPropagation());

            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('nextBtn').addEventListener('click', nextTrack);

            document.getElementById('mobilePlayPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('mobilePrevBtn').addEventListener('click', prevTrack);
            document.getElementById('mobileNextBtn').addEventListener('click', nextTrack);

            document.getElementById('downloadBtn').addEventListener('click', redirectToDownload);
            document.getElementById('mobileDownloadBtn').addEventListener('click', redirectToDownload);
            
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => player?.setVolume(e.target.value));
            
            progressBarContainer.addEventListener('mousedown', startScrub);
            progressBarContainer.addEventListener('touchstart', startScrub, { passive: false });

            window.addEventListener('mousemove', moveScrub);
            window.addEventListener('touchmove', moveScrub, { passive: false });

            window.addEventListener('mouseup', endScrub);
            window.addEventListener('touchend', endScrub);

            document.getElementById('apiConfigBtn').addEventListener('click', openApiModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeApiModal);
            document.getElementById('modalSaveBtn').addEventListener('click', saveSettingsFromModal);

            swipeTitle.addEventListener('touchstart', dragStart, { passive: true });
            swipeTitle.addEventListener('touchmove', dragMove, { passive: false });
            swipeTitle.addEventListener('touchend', dragEnd, { passive: true });

            swipeTitle.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);
            
            checkAndApplyMarquee();
        });

        function populateThemeSelect() {
            const select = document.getElementById('modalThemeSelect');
            if (!select) return;
            select.innerHTML = '';
            for (const [key, theme] of Object.entries(themes)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = theme.name;
                if (key === appState.currentTheme) option.selected = true;
                select.appendChild(option);
            }
        }

        function applyTheme(themeKey) {
            const theme = themes[themeKey] || themes.microsoftZune;
            const root = document.documentElement;
            
            root.style.setProperty('--bg-main', theme.bgMain);
            root.style.setProperty('--bg-card', theme.bgCard);
            root.style.setProperty('--bg-input', theme.bgInput);
            root.style.setProperty('--accent', theme.accent);
            root.style.setProperty('--text-main', theme.textMain);
            root.style.setProperty('--text-muted', theme.textMuted);
            root.style.setProperty('--is-light', theme.isLight);

            document.getElementById('metaThemeColor')?.setAttribute('content', theme.bgMain);
            appState.currentTheme = themeKey;

            const searchBtn = document.getElementById('searchBtn');
            const saveBtn = document.getElementById('modalSaveBtn');
            
            if (theme.isLight) {
                searchBtn?.classList.remove('text-black');
                searchBtn?.classList.add('text-white');
                saveBtn?.classList.remove('text-black');
                saveBtn?.classList.add('text-white');
            } else {
                searchBtn?.classList.remove('text-white');
                searchBtn?.classList.add('text-black');

        function openApiModal() {
            const modal = document.getElementById('apiModal');
            const input = document.getElementById('modalApiKeyInput');

                input.value = appState.apiKey;
                if (select) select.value = appState.currentTheme;

            }
        }

        function closeApiModal() {
            const modal = document.getElementById('apiModal');
            if (modal) modal.classList.add('hidden');
        }

        function saveSettingsFromModal() {
            const key = document.getElementById('modalApiKeyInput').value.trim();
            const selectedTheme = document.getElementById('modalThemeSelect').value;
            
            appState.apiKey = key;
            localStorage.setItem('youtubette_api_key', key);
            
            localStorage.setItem('youtubette_theme', selectedTheme);
            applyTheme(selectedTheme);
            
            const saveBtn = document.getElementById('modalSaveBtn');
            const originalText = saveBtn.innerHTML;
            
            saveBtn.innerHTML = "Salvato! ✓";
            saveBtn.style.backgroundColor = "var(--text-main)";
            saveBtn.style.color = "var(--bg-main)";
            
            setTimeout(() => {
                saveBtn.innerHTML = originalText;
                saveBtn.style.backgroundColor = "";
                saveBtn.style.color = "";
                if (themes[selectedTheme].isLight) {
                    saveBtn.classList.add('text-white');
                    saveBtn.classList.remove('text-black');
                } else {
                    saveBtn.classList.add('text-black');
                    saveBtn.classList.remove('text-white');
                }
                closeApiModal();
            }, 800);
        }

        async function redirectToDownload() {
            if (appState.currentIndex === -1) return;
            const currentTrack = appState.tracks[appState.currentIndex];
            if (!currentTrack || !currentTrack.id) return;
            
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrack.id}`;
            
            try {
                await navigator.clipboard.writeText(youtubeUrl);
                showToast("Link copiato! Incollalo sul sito.");
                
                setTimeout(() => {
                    const downloadServiceUrl = `https://kleger.pl/`;
                    const newWindow = window.open(downloadServiceUrl, '_blank');
                    if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
                        window.location.href = downloadServiceUrl;
                    }
                }, 800);

            } catch (err) {
                console.error('Errore durante la copia: ', err);
                const downloadServiceUrl = `https://kleger.pl/`;
                window.open(downloadServiceUrl, '_blank');
            }
        }

        function showToast(message) {
            const oldToast = document.getElementById('youtubette-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'youtubette-toast';
            
            toast.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 border font-medium text-xs py-2.5 px-5 rounded-full shadow-2xl z-50 transition-all duration-300 opacity-0 translate-y-2 custom-bg-card border-[var(--accent)] text-[var(--text-main)]';
            toast.innerHTML = `<i class="fa-solid fa-circle-check mr-2 custom-text-accent"></i> ${message}`;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 50);
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function toggleDownloadButtons(enabled) {
            const dBtn = document.getElementById('downloadBtn');
            const mDBtn = document.getElementById('mobileDownloadBtn');
            
            if (!dBtn || !mDBtn) return;

            if (enabled) {
                dBtn.disabled = false;
                dBtn.removeAttribute('disabled');
                dBtn.classList.remove('opacity-30', 'cursor-not-allowed', 'text-gray-500');
                dBtn.classList.add('opacity-100', 'text-gray-400', 'cursor-pointer');
                
                mDBtn.disabled = false;
                mDBtn.removeAttribute('disabled');
                mDBtn.classList.remove('opacity-30', 'text-gray-500');
                mDBtn.classList.add('opacity-100', 'cursor-pointer');
                mDBtn.style.color = "var(--accent)";
            } else {
                dBtn.disabled = true;
                dBtn.setAttribute('disabled', 'true');
                dBtn.classList.add('opacity-30', 'cursor-not-allowed', 'text-gray-500');
                dBtn.classList.remove('opacity-100', 'text-gray-400', 'cursor-pointer');
                
                mDBtn.disabled = true;
                mDBtn.setAttribute('disabled', 'true');
                mDBtn.classList.add('opacity-30', 'text-gray-500');
                mDBtn.classList.remove('opacity-100', 'cursor-pointer');
                mDBtn.style.color = "";
            }
        }

        function getClientX(e) {
            if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
            if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
            return e.clientX;
        }

        function updateScrubPosition(e) {
            const rect = progressBarContainer.getBoundingClientRect();
            const clientX = getClientX(e);
            let offsetX = clientX - rect.left;
            offsetX = Math.max(0, Math.min(offsetX, rect.width));
            scrubPercentage = offsetX / rect.width;

            const duration = player.getDuration() || 0;
            const targetTime = duration * scrubPercentage;

            progressBar.style.width = `${scrubPercentage * 100}%`;
            document.getElementById('currentTime').innerText = formatTime(targetTime);

            let relativeLeft = clientX - rect.left;
            relativeLeft = Math.max(0, Math.min(relativeLeft, rect.width));
            progressTooltip.innerText = formatTime(targetTime);
            progressTooltip.style.left = `${relativeLeft}px`;
            progressTooltip.classList.remove('hidden');
        }

        function startScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            progressBar.classList.add('scrubbing');
            updateScrubPosition(e);
        }

        function moveScrub(e) {
            if (!isScrubbing) return;
            if (e.cancelable) e.preventDefault();
            updateScrubPosition(e);
        }

        function endScrub(e) {
            if (!isScrubbing) return;
            isScrubbing = false;
            progressBar.classList.remove('scrubbing');
            progressTooltip.classList.add('hidden');

            const duration = player.getDuration() || 0;
            player.seekTo(duration * scrubPercentage, true);
        }

        function dragStart(e) {
            isDragging = true;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            swipeTitle.classList.add('dragging');
            marqueeContent.classList.remove('animate-marquee');
        }

        function dragMove(e) {
            if (!isDragging) return;
            currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
            const opacity = Math.max(0.2, 1 - Math.abs(currentX) / 350);
            swipeTitle.style.transform = `translate3d(${currentX}px, 0, 0)`;
            swipeTitle.style.opacity = opacity;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            swipeTitle.classList.remove('dragging');

            const threshold = 75;
            if (currentX > threshold) {
                animateOutAndChange('right');
            } else if (currentX < -threshold) {
                animateOutAndChange('left');
            } else {
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
                checkAndApplyMarquee();
            }
            currentX = 0;
        }

        function animateOutAndChange(direction) {
            if (appState.tracks.length === 0) {
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
                return;
            }
            swipeTitle.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
            swipeTitle.style.transform = `translate3d(${direction === 'right' ? '100%' : '-100%'}, 0, 0)`;
            swipeTitle.style.opacity = '0';
            setTimeout(() => {
                if (direction === 'right') prevTrack(); else nextTrack();
                swipeTitle.style.transition = 'none';
                swipeTitle.style.transform = `translate3d(${direction === 'right' ? '-100%' : '100%'}, 0, 0)`;
                swipeTitle.offsetHeight;
                swipeTitle.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-out';
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
            }, 200);
        }

        function checkAndApplyMarquee() {
            const titleEl = document.getElementById('playerTrackTitle');
            const channelEl = document.getElementById('playerTrackChannel');
            
            const titleText = titleEl ? titleEl.innerText : 'YouTubette';
            const channelText = channelEl ? channelEl.innerText : '';
            
            marqueeContent.classList.remove('animate-marquee');
            const wrapper = swipeTitle.querySelector('.marquee-wrapper');
            
            let cleanText = `<span id="playerTrackTitle" class="text-sm md:text-base font-bold text-[var(--text-main)]">${titleText}</span>`;
            if (channelText) {
                cleanText += `<span id="playerTrackChannel" class="text-xs ml-3 font-normal custom-text-muted">${channelText}</span>`;
            }
            
            marqueeContent.innerHTML = cleanText;

            if (wrapper && marqueeContent.scrollWidth > wrapper.clientWidth) {
                marqueeContent.innerHTML += "<span class='inline-block w-16'></span>" + cleanText;
                marqueeContent.classList.add('animate-marquee');
            }
        }

        async function performSearch(isLoadMore = false) {
            const query = document.getElementById('searchInput').value.trim();
            if (!query || (isLoadMore && isFetchingMore)) return;
            if (!appState.apiKey) { openApiModal(); return; }

            const placeholderText = document.getElementById('placeholderText');
            if (!isLoadMore) {
                if (placeholderText) placeholderText.innerText = "Ricerca in corso...";
                appState.tracks = []; appState.currentIndex = -1; nextSearchPageToken = '';
                toggleDownloadButtons(false);
            } else isFetchingMore = true;

            const order = document.getElementById('filterOrder').value;
            const duration = document.getElementById('filterDuration').value;
            const publishedAfterSelect = document.getElementById('filterPublishedAfter').value;

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&order=${order}&key=${appState.apiKey}`;
                if (duration !== 'any') url += `&videoDuration=${duration}`;
                if (publishedAfterSelect !== 'any') {
                    const now = new Date();
                    if (publishedAfterSelect === 'hour') now.setHours(now.getHours() - 1);
                    else if (publishedAfterSelect === 'day') now.setDate(now.getDate() - 1);
                    else if (publishedAfterSelect === 'week') now.setDate(now.getDate() - 7);
                    else if (publishedAfterSelect === 'month') now.setMonth(now.getMonth() - 1);
                    else if (publishedAfterSelect === 'year') now.setFullYear(now.getFullYear() - 1);
                    url += `&publishedAfter=${now.toISOString()}`;
                }

                if (nextSearchPageToken) url += `&pageToken=${nextSearchPageToken}`;

                const response = await fetch(url);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                nextSearchPageToken = data.nextPageToken || '';
                let newTracks = data.items.map(item => ({
                    id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle, thumbnail: item.snippet.thumbnails.default.url
                }));

                if (order !== 'date') {
                    for (let i = newTracks.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newTracks[i], newTracks[j]] = [newTracks[j], newTracks[i]];
                    }
                }

                appState.tracks = appState.tracks.concat(newTracks);
                renderTracklist();
            } catch (error) {
                alert(error.message);
                if (placeholderText && !isLoadMore) placeholderText.innerText = "";
            } finally { if (isLoadMore) isFetchingMore = false; }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; trackListDiv.innerHTML = '';
            
            if (appState.tracks.length === 0) {
                trackListDiv.innerHTML = '<p class="text-sm p-2 italic text-center custom-text-muted">Nessun risultato.</p>';
                return;
            }

            const currentThemeData = themes[appState.currentTheme];
            const rowSelectedBgClass = currentThemeData?.isLight ? 'bg-neutral-300/70' : 'bg-neutral-800';
            const rowHoverClass = currentThemeData?.isLight ? 'md:hover:bg-neutral-200 active:bg-neutral-200' : 'md:hover:bg-neutral-900 active:bg-neutral-900';

            appState.tracks.forEach((track, index) => {
                const trackRow = document.createElement('div');
                trackRow.id = `track-row-${index}`;
                trackRow.className = `flex items-center p-2 rounded-xl cursor-pointer transition-all ${rowHoverClass} ${appState.currentIndex === index ? rowSelectedBgClass : ''}`;
               
                trackRow.innerHTML = `
                    <div class="w-6 text-center text-xs custom-text-muted">${index + 1}</div>
                    <img src="${track.thumbnail}" class="w-9 h-9 object-cover rounded-lg mx-2.5 shadow-sm">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-medium truncate ${appState.currentIndex === index ? 'custom-text-accent font-semibold' : 'text-[var(--text-main)]'}">${track.title}</p>
                        <p class="text-[10px] truncate mt-0.5 custom-text-muted">${track.channel}</p>
                    </div>
                `;
                trackRow.addEventListener('click', () => {
                    loadTrack(index);
                    if (index === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
                });
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            
            const currentThemeData = themes[appState.currentTheme];
            const rowSelectedBgClass = currentThemeData?.isLight ? 'bg-neutral-300/70' : 'bg-neutral-800';

            if (appState.currentIndex !== -1) {
                const oldRow = document.getElementById(`track-row-${appState.currentIndex}`);
                if (oldRow) {
                    oldRow.classList.remove(rowSelectedBgClass, 'bg-neutral-800', 'bg-neutral-300/70');
                    const oldText = oldRow.querySelector('p.text-xs');
                    if (oldText) { oldText.classList.remove('custom-text-accent', 'font-semibold'); oldText.classList.add('text-[var(--text-main)]'); }
                }
            }

            appState.currentIndex = index;
            const track = appState.tracks[index];

            const titleEl = document.getElementById('playerTrackTitle');
            const channelEl = document.getElementById('playerTrackChannel');
            if (titleEl) titleEl.innerText = track.title;
            if (channelEl) channelEl.innerText = track.channel;

            const newRow = document.getElementById(`track-row-${index}`);
            if (newRow) {
                newRow.classList.add(rowSelectedBgClass);
                const newText = newRow.querySelector('p.text-xs');
                if (newText) { newText.classList.remove('text-[var(--text-main)]'); newText.classList.add('custom-text-accent', 'font-semibold'); }
                
                newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (player?.loadVideoById) player.loadVideoById(track.id);
            checkAndApplyMarquee();
            updateMediaSessionMetadata(track);
            toggleDownloadButtons(true);
            
            updateInternalDeviceScreens(track);
        }

        function updateInternalDeviceScreens(track) {
            const podTitle = document.getElementById('podScreenTitle');
            if (podTitle) podTitle.innerText = track.title;
            
            const zuneTitle = document.getElementById('zuneScreenTitle');
            const zuneArtist = document.getElementById('zuneScreenArtist');
            if (zuneTitle) zuneTitle.innerText = track.title;
            if (zuneArtist) zuneArtist.innerText = track.channel;

            const hifiName = document.getElementById('hifiTrackName');
            if (hifiName) hifiName.innerText = track.title.substring(0, 24).toUpperCase();
        }

        function updateMediaSessionMetadata(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.channel, album: 'YouTubette Beats',
                    artwork: [{ src: track.thumbnail, sizes: '120x120', type: 'image/jpeg' }]
                });
            }
        }

        function updateMediaSessionState(isPlaying) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
        }

        function setupMediaSessionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let nextIdx = appState.currentIndex + 1;
            if (nextIdx >= appState.tracks.length) {
                if (nextSearchPageToken) {
                    performSearch(true).then(() => { if (appState.tracks[nextIdx]) loadTrack(nextIdx); });
                } else loadTrack(0);
            } else {
                loadTrack(nextIdx);
                if (nextIdx === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
            }
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let prevIdx = appState.currentIndex - 1;
            if (prevIdx < 0) prevIdx = appState.tracks.length - 1;
            loadTrack(prevIdx);
        }

        function startProgressLoop() {
            setInterval(() => {
                if (player?.getCurrentTime && appState.isPlaying && !isScrubbing) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        const pct = (currentTime / duration) * 100;
                        progressBar.style.width = `${pct}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                        
                        const podBar = document.getElementById('podScreenBar');
                        const podTime = document.getElementById('podScreenTime');
                        if (podBar) podBar.style.width = `${pct}%`;
                        if (podTime) podTime.innerText = formatTime(currentTime);

                        if (appState.currentTheme === 'hiFiRecorder') {
                            const bars = document.querySelectorAll('.vu-meter-bar');
                            bars.forEach((bar, i) => {
                                const randHeight = Math.floor(Math.random() * 85) + 15;
                                bar.style.height = `${randHeight}%`;
                            });
                        }
                    }
                }
            }, 500);
        }

        function updateDuration() {
            if (player?.getDuration) document.getElementById('durationTime').innerText = formatTime(player.getDuration());
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
