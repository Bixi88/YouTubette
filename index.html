<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTubette - Player</title>
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#0b0b0b" id="metaThemeColor">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YouTubette">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: rgba(18, 18, 18, 0.4);
            --bg-input: rgba(26, 26, 26, 0.6);
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --is-light: 0;
        }

        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* Rimosse tutte le scrollbar visibili per un look pulito */
        ::-webkit-scrollbar { display: none; }

        .ambient-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.45;
            filter: blur(60px);
            transform: scale(1.15);
            pointer-events: none;
            transition: background-image 1.2s ease;
            background-position: center;
            background-size: cover;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Bottom Sheet - Copre l'intero schermo */
        #nowPlayingSheet {
            position: fixed;
            top: 100%;
            left: 0;
            right: 0;
            height: 100%;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            background-color: #000;
            overflow: hidden;
        }
        #nowPlayingSheet.expanded {
            transform: translateY(-100%);
        }

        /* Sfondo immersivo full-page del player singolo */
        #nowPlayingArtworkBg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) saturate(1.2);
            transform: scale(1.05);
            transition: background-image 0.8s ease;
        }
        #nowPlayingGradientOverlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.8) 100%);
        }

        /* Search Bar */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex: 1;
            margin-left: 1rem;
        }
        #searchInput {
            width: 0px;
            opacity: 0;
            pointer-events: none;
            transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease, padding 0.3s ease;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-container.active #searchInput {
            width: 100%;
            opacity: 1;
            pointer-events: auto;
            padding-left: 1rem;
            padding-right: 2.5rem;
        }

        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }
        .animate-marquee {
            animation: marqueeLoop 18s linear infinite;
        }
        @keyframes marqueeLoop {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        .custom-bg-main { background-color: var(--bg-main); }
        .custom-bg-card { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .custom-bg-input { background-color: var(--bg-input); }
        .custom-text-accent { color: var(--accent); }
        .custom-bg-accent { background-color: var(--accent); }
        .custom-border-accent { border-color: var(--accent); }
        .custom-text-muted { color: var(--text-muted); }

        /* Stile Custom Dropdown */
        .custom-select-option:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="font-sans flex flex-col justify-between hidden p-4 box-border h-full custom-bg-main relative">

    <div id="globalAmbientBg" class="ambient-bg"></div>

    <header class="h-16 px-2 flex items-center justify-between shrink-0 z-40 relative">
        <button id="apiConfigBtn" class="text-white w-10 h-10 rounded-full flex items-center justify-center bg-white/5 active:scale-90 transition-all" title="Impostazioni">
            <i class="fa-solid fa-sliders text-base"></i>
        </button>

        <div id="headerTitle" class="absolute left-1/2 -translate-x-1/2 pointer-events-none transition-opacity duration-300">
            <span class="font-black tracking-widest text-white text-xs uppercase">YOUTUBETTE</span>
        </div>
        
        <div class="search-container" id="searchContainer">
            <input type="text" id="searchInput" placeholder="Cerca canzoni o artisti..." 
                class="text-xs py-2 rounded-full focus:outline-none focus:border-[var(--accent)] text-white">
            
            <button id="searchTriggerBtn" class="absolute right-0 w-10 h-10 rounded-full flex items-center justify-center bg-white/5 text-white active:scale-90 transition-all" title="Cerca">
                <i class="fa-solid fa-magnifying-glass text-sm" id="searchIcon"></i>
            </button>
        </div>

        <button id="pwaInstallBtn" class="hidden absolute top-20 right-4 text-black font-bold text-[10px] px-3 py-1 rounded-full active:scale-95 transition-transform custom-bg-accent z-50">
            <i class="fa-solid fa-download mr-1"></i> Installa
        </button>
    </header>

    <div id="filterMenu" class="hidden absolute top-16 left-4 right-4 border rounded-2xl p-4 shadow-2xl z-50 space-y-3 custom-bg-card border-neutral-800/40">
        <p class="text-xs font-bold uppercase tracking-wider mb-1 custom-text-muted">Filtri di Ricerca</p>
        <div class="grid grid-cols-1 gap-2.5">
            <div>
                <label class="block text-[10px] mb-1 custom-text-muted">Ordina per</label>
                <select id="filterOrder" class="w-full text-xs p-2.5 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-white">
                    <option value="relevance">Rilevanza</option>
                    <option value="date" selected>Data di caricamento</option>
                    <option value="viewCount">Visualizzazioni</option>
                </select>
            </div>
        </div>
    </div>

    <main class="flex-1 flex flex-col overflow-hidden mb-28 z-10 relative">
        <section class="flex-1 p-3 flex flex-col rounded-3xl overflow-hidden h-full">
            <div class="flex items-center justify-between px-2 pb-3 shrink-0">
                <span class="text-[10px] font-bold uppercase tracking-widest custom-text-muted">Brani trovati</span>
                <span id="trackCount" class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-white/5 custom-text-muted">0 brani</span>
            </div>
            <div class="relative flex-1 overflow-hidden mt-1">
                <div id="trackList" class="space-y-1 pb-16 h-full overflow-y-auto pr-1">
                    <p id="placeholderText" class="text-xs p-8 italic text-center mt-12 custom-text-muted">Usa la lente in alto a destra per cercare brani.</p>
                </div>
            </div>
        </section>

        <div id="ytPlayerContainer" class="absolute top-0 left-0 w-1 h-1 opacity-0 pointer-events-none"></div>
    </main>

    <div id="miniPlayer" class="hidden fixed bottom-4 left-4 right-4 h-24 rounded-2xl glass-panel shadow-2xl z-40 flex flex-col justify-between p-3.5 select-none active:scale-[0.99] transition-all duration-300">
        
        <div id="miniPlayerContent" class="flex items-center justify-between w-full flex-1 min-w-0" style="touch-action: none;">
            <div class="flex items-center flex-1 min-w-0 mr-3 cursor-pointer" id="miniPlayerDetails">
                <img id="miniPlayerImg" src="" class="w-12 h-12 object-cover rounded-full shadow-md shrink-0 bg-neutral-800 transition-transform duration-300">
                <div class="ml-3 min-w-0 flex-1 transition-transform duration-100 ease-out" id="miniPlayerTextContainer">
                    <p id="miniPlayerTitle" class="text-sm font-bold truncate text-[var(--text-main)]"></p>
                    <p id="miniPlayerChannel" class="text-[11px] truncate custom-text-muted mt-0.5"></p>
                </div>
            </div>

            <div class="flex items-center space-x-1 shrink-0" id="miniPlayerControls">
                <button id="miniPrevBtn" class="p-2 text-gray-400 active:text-[var(--text-main)] text-base active:scale-90 transition-transform"><i class="fa-solid fa-backward-step"></i></button>
                <button id="miniPlayPauseBtn" class="w-10 h-10 rounded-full flex items-center justify-center text-sm shadow-md bg-white text-black active:scale-90 transition-transform">
                    <i class="fa-solid fa-play ml-0.5" id="miniPlayIcon"></i>
                </button>
                <button id="miniNextBtn" class="p-2 text-gray-400 active:text-[var(--text-main)] text-base active:scale-90 transition-transform"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>

        <div class="flex items-center justify-between w-full text-[9px] font-mono custom-text-muted mt-2 px-1">
            <span id="miniCurrentTime">0:00</span>
            <div id="miniProgressBarContainer" class="flex-1 mx-3 h-3 flex items-center relative cursor-pointer">
                <div class="w-full h-[3px] bg-white/10 rounded-full"></div>
                <div id="miniProgressBar" class="absolute top-1/2 -translate-y-1/2 left-0 h-[3px] w-0 custom-bg-accent rounded-full transition-all duration-100"></div>
            </div>
            <span id="miniDurationTime">0:00</span>
        </div>
    </div>

    <div id="nowPlayingSheet" class="flex flex-col px-6 pb-8 pt-4 select-none">
        <div id="nowPlayingArtworkBg"></div>
        <div id="nowPlayingGradientOverlay"></div>

        <div id="sheetHeaderDrag" class="w-full flex flex-col items-center py-2 shrink-0 z-10 cursor-pointer">
            <div class="w-12 h-1 bg-white/30 rounded-full mb-4"></div>
            <div class="flex items-center justify-between w-full px-1">
                <button id="closeSheetBtn" class="text-neutral-300 hover:text-white p-2 text-lg active:scale-90 transition-transform">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <span class="text-[10px] font-bold uppercase tracking-widest text-neutral-300">In Riproduzione</span>
                <button id="sheetDownloadBtn" class="text-neutral-300 hover:text-[var(--accent)] p-2 text-base opacity-30 cursor-not-allowed" disabled>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center my-auto z-10 relative">
            <div class="w-full max-w-sm text-center mb-6">
                <div id="swipeTitleContainer" class="w-full py-2 cursor-grab active:cursor-grabbing select-none" style="touch-action: none;">
                    <div class="marquee-wrapper mx-auto max-w-xs">
                        <div id="marqueeContent" class="marquee-content">
                            <span id="playerTrackTitle" class="text-xl md:text-2xl font-black text-[var(--text-main)]">Nessun Brano</span>
                        </div>
                    </div>
                </div>
                <p id="playerTrackChannel" class="text-sm mt-1.5 font-bold custom-text-muted"></p>
            </div>
        </div>

        <div class="w-full max-w-sm mx-auto z-10 shrink-0">
            <div class="flex items-center justify-between text-[11px] mb-2 custom-text-muted font-mono px-1">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
            
            <div class="h-5 rounded-full relative cursor-pointer py-1.5 mb-6 group" id="progressBarContainer">
                <div class="w-full h-1.5 rounded-full absolute top-1.5 left-0 bg-white/15 transition-all group-hover:h-2"></div>
                <div class="h-1.5 rounded-full w-0 absolute top-1.5 left-0 transition-all duration-100 custom-bg-accent group-hover:h-2" id="progressBar"></div>
                
                <div id="progressTooltip" class="hidden absolute bottom-full mb-2 text-black font-bold text-[10px] px-2 py-1 rounded-lg shadow-xl pointer-events-none transform -translate-x-1/2 z-50 custom-bg-accent">
                    0:00
                </div>
            </div>

            <div class="flex items-center justify-between px-6 mb-8">
                <button id="prevBtn" class="text-gray-300 active:text-[var(--text-main)] hover:text-[var(--text-main)] transition-colors text-xl p-2 active:scale-90"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playPauseBtn" class="w-16 h-16 rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform text-xl shadow-2xl bg-white text-black">
                    <i class="fa-solid fa-play ml-1" id="playIcon"></i>
                </button>
                <button id="nextBtn" class="text-gray-300 active:text-[var(--text-main)] hover:text-[var(--text-main)] transition-colors text-xl p-2 active:scale-90"><i class="fa-solid fa-forward-step"></i></button>
            </div>

            <div class="hidden md:flex items-center space-x-3 justify-center custom-text-muted px-4 py-2 bg-white/10 rounded-2xl mb-2 backdrop-blur-md">
                <i class="fa-solid fa-volume-high text-xs"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="100" 
                    class="w-full h-1 rounded-full appearance-none cursor-pointer accent-[var(--text-main)] bg-neutral-700">
            </div>
        </div>
    </div>

    <div id="apiModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="border w-full max-w-md rounded-3xl p-6 shadow-2xl relative custom-bg-card border-white/5">
            <h3 class="text-base font-bold mb-5 flex items-center text-[var(--text-main)]">
                <i class="fa-solid fa-sliders mr-2.5 custom-text-accent"></i> Impostazioni
            </h3>
            
            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 custom-text-muted">YouTube API Key</label>
                <input type="text" id="modalApiKeyInput" placeholder="Incolla qui la tua chiave API..." 
                    class="w-full text-xs px-4 py-3.5 rounded-xl border border-transparent focus:outline-none focus:border-[var(--text-main)] custom-bg-input text-white">
            </div>

            <div class="mb-4 relative">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 custom-text-muted">Stile Interfaccia</label>
                <div id="customSelectTrigger" class="w-full text-xs px-4 py-3.5 rounded-xl border border-transparent cursor-pointer flex justify-between items-center custom-bg-input text-white">
                    <span id="customSelectValue">Seleziona Tema</span>
                    <i class="fa-solid fa-chevron-down text-neutral-400"></i>
                </div>
                <div id="customSelectOptions" class="hidden absolute left-0 right-0 mt-1 max-h-52 overflow-y-auto rounded-xl border border-white/10 bg-[#161616] shadow-2xl z-50 p-1">
                    </div>
            </div>

            <div class="flex items-center justify-end space-x-3 mt-6">
                <button id="modalCancelBtn" class="hover:text-white font-semibold text-xs px-4 py-2 rounded-full transition-colors custom-text-muted">Annulla</button>
                <button id="modalSaveBtn" class="font-bold text-xs px-5 py-2 rounded-xl active:scale-95 transition-all custom-bg-accent text-black">Salva</button>
            </div>
        </div>
    </div>

    <script>
        // 15 Palette di colori uniche tra cui Synthwave e Amber Gold
        const themes = {
            spotifyGreen: { name: "Spotify Green (Dark / Green)", bgMain: "#090909", bgCard: "rgba(18, 18, 18, 0.45)", bgInput: "rgba(28, 28, 28, 0.6)", accent: "#1DB954", textMain: "#ffffff", textMuted: "#a3a3a3", isLight: 0 },
            amoledWhite:  { name: "Pure AMOLED (Black / White)", bgMain: "#000000", bgCard: "rgba(0, 0, 0, 0.5)", bgInput: "rgba(18, 18, 18, 0.6)", accent: "#ffffff", textMain: "#ffffff", textMuted: "#888888", isLight: 0 },
            synthwave:    { name: "Synthwave Neon (Outrun Purple)", bgMain: "#0d0116", bgCard: "rgba(24, 6, 38, 0.5)", bgInput: "rgba(42, 10, 66, 0.6)", accent: "#ff007f", textMain: "#ffffff", textMuted: "#00f0ff", isLight: 0 },
            amberGold:    { name: "Amber Gold (Luxury Warmth)", bgMain: "#0f0c05", bgCard: "rgba(30, 24, 12, 0.5)", bgInput: "rgba(45, 36, 18, 0.6)", accent: "#ffbf00", textMain: "#ffffff", textMuted: "#d4af37", isLight: 0 },
            cyberPurple:  { name: "Cyber Purple (Dark / Neon Purple)", bgMain: "#07040a", bgCard: "rgba(15, 9, 22, 0.45)", bgInput: "rgba(25, 17, 36, 0.6)", accent: "#bf5af2", textMain: "#ffffff", textMuted: "#9893a5", isLight: 0 },
            deepBlue:     { name: "Oceanic Depth (Dark / Electric Blue)", bgMain: "#03070d", bgCard: "rgba(8, 16, 28, 0.45)", bgInput: "rgba(16, 30, 51, 0.6)", accent: "#0a84ff", textMain: "#ffffff", textMuted: "#8e9bb4", isLight: 0 },
            lavaRed:      { name: "Lava Crimson (Dark / Material Red)", bgMain: "#0a0404", bgCard: "rgba(18, 9, 9, 0.45)", bgInput: "rgba(30, 17, 17, 0.6)", accent: "#ff453a", textMain: "#ffffff", textMuted: "#aa9999", isLight: 0 },
            forestGreen:  { name: "Forest Moss (Dark / Organic)", bgMain: "#050705", bgCard: "rgba(12, 18, 12, 0.45)", bgInput: "rgba(22, 30, 22, 0.6)", accent: "#30d158", textMain: "#ffffff", textMuted: "#99aa99", isLight: 0 },
            electricOrange:{ name: "Electric Orange (Neon Orange)", bgMain: "#0b0602", bgCard: "rgba(22, 12, 5, 0.45)", bgInput: "rgba(34, 19, 8, 0.6)", accent: "#ff9f0a", textMain: "#ffffff", textMuted: "#ccaa99", isLight: 0 },
            rosegold:     { name: "Rose Gold (Soft Pink)", bgMain: "#0c0709", bgCard: "rgba(24, 14, 18, 0.45)", bgInput: "rgba(36, 21, 27, 0.6)", accent: "#ff375f", textMain: "#ffffff", textMuted: "#cca3af", isLight: 0 },
            midnight:     { name: "Midnight Teal (Deep Teal)", bgMain: "#01080c", bgCard: "rgba(3, 16, 24, 0.45)", bgInput: "rgba(6, 28, 42, 0.6)", accent: "#64d2ff", textMain: "#ffffff", textMuted: "#8ca8b8", isLight: 0 },
            toxicSlime:   { name: "Toxic Slime (Neon Yellow-Green)", bgMain: "#070802", bgCard: "rgba(14, 16, 5, 0.45)", bgInput: "rgba(24, 28, 8, 0.6)", accent: "#ccff00", textMain: "#ffffff", textMuted: "#a8b88c", isLight: 0 },
            monochromeGray:{ name: "Nordic Frost (Neutral Gray)", bgMain: "#0f0f10", bgCard: "rgba(24, 24, 26, 0.45)", bgInput: "rgba(36, 36, 40, 0.6)", accent: "#ebebf5", textMain: "#ffffff", textMuted: "#929296", isLight: 0 },
            ultraViolet:  { name: "Ultra Violet (Vivid Purple-Blue)", bgMain: "#05020c", bgCard: "rgba(12, 5, 26, 0.45)", bgInput: "rgba(21, 9, 44, 0.6)", accent: "#5e5ce6", textMain: "#ffffff", textMuted: "#a29dc8", isLight: 0 },
            sakura:       { name: "Sakura Cherry (Soft Pastel Pink)", bgMain: "#0c0507", bgCard: "rgba(26, 12, 16, 0.45)", bgInput: "rgba(42, 20, 26, 0.6)", accent: "#ffb7c5", textMain: "#ffffff", textMuted: "#e0b0bc", isLight: 0 }
        };

        let appState = {
            apiKey: localStorage.getItem('youtubette_api_key') || '',
            currentTheme: localStorage.getItem('youtubette_theme') || 'spotifyGreen',
            tracks: [],
            currentIndex: -1,
            isPlaying: false
        };
        let deferredPrompt, nextSearchPageToken = '', isFetchingMore = false;
        let isScrubbing = false; 
        let scrubPercentage = 0;
        
        const nowPlayingSheet = document.getElementById('nowPlayingSheet');
        const nowPlayingArtworkBg = document.getElementById('nowPlayingArtworkBg');
        const miniPlayer = document.getElementById('miniPlayer');
        const miniPlayerContent = document.getElementById('miniPlayerContent');
        const miniPlayerTextContainer = document.getElementById('miniPlayerTextContainer');
        const sheetHeaderDrag = document.getElementById('sheetHeaderDrag');
        const closeSheetBtn = document.getElementById('closeSheetBtn');
        const globalAmbientBg = document.getElementById('globalAmbientBg');

        const searchContainer = document.getElementById('searchContainer');
        const searchInput = document.getElementById('searchInput');
        const searchTriggerBtn = document.getElementById('searchTriggerBtn');
        const searchIcon = document.getElementById('searchIcon');
        const headerTitle = document.getElementById('headerTitle');

        const swipeTitle = document.getElementById('swipeTitleContainer');
        const marqueeContent = document.getElementById('marqueeContent');
        
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressTooltip = document.getElementById('progressTooltip');
        
        const miniProgressBarContainer = document.getElementById('miniProgressBarContainer');
        const miniProgressBar = document.getElementById('miniProgressBar');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((reg) => {
                    setInterval(() => reg.update(), 60 * 60 * 1000);
                }).catch(err => console.log(err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            if (document.getElementById('pwaInstallBtn')) document.getElementById('pwaInstallBtn').classList.remove('hidden');
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        let player;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(document.getElementById('volumeSlider')?.value || 100);
            startProgressLoop();
            setupMediaSessionHandlers();
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon');
            const miniPlayIcon = document.getElementById('miniPlayIcon');
            
            if (event.data == YT.PlayerState.PLAYING) {
                appState.isPlaying = true;
                if(playIcon) playIcon.className = "fa-solid fa-pause";
                if(miniPlayIcon) miniPlayIcon.className = "fa-solid fa-pause";
                updateDuration(); updateMediaSessionState(true);
            } else {
                appState.isPlaying = false;
                if(playIcon) playIcon.className = "fa-solid fa-play ml-1";
                if(miniPlayIcon) miniPlayIcon.className = "fa-solid fa-play ml-0.5";
                updateMediaSessionState(false);
                if (event.data == YT.PlayerState.ENDED) {
                    nextTrack();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(appState.currentTheme);
            populateCustomThemeSelect();

            document.body.classList.remove('hidden');
            
            searchTriggerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!searchContainer.classList.contains('active')) {
                    searchContainer.classList.add('active');
                    headerTitle.classList.add('opacity-0');
                    searchIcon.className = "fa-solid fa-arrow-right text-sm";
                    searchInput.focus();
                } else {
                    if (searchInput.value.trim() !== "") {
                        performSearch(false);
                    } else {
                        closeSearch();
                    }
                }
            });

            searchInput.addEventListener('keypress', (e) => { 
                if (e.key === 'Enter') {
                    performSearch(false);
                    searchInput.blur();
                } 
            });

            document.addEventListener('click', (e) => {
                if (!searchContainer.contains(e.target)) {
                    closeSearch();
                }
            });

            function closeSearch() {
                searchContainer.classList.remove('active');
                headerTitle.classList.remove('opacity-0');
                searchIcon.className = "fa-solid fa-magnifying-glass text-sm";
            }

            document.getElementById('miniPlayerDetails').addEventListener('click', () => {
                nowPlayingSheet.classList.add('expanded');
            });
            closeSheetBtn.addEventListener('click', () => {
                nowPlayingSheet.classList.remove('expanded');
            });

            document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
            document.getElementById('miniPlayPauseBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });

            document.getElementById('prevBtn').addEventListener('click', prevTrack);
            document.getElementById('miniPrevBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                prevTrack();
            });

            document.getElementById('nextBtn').addEventListener('click', nextTrack);
            document.getElementById('miniNextBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                nextTrack();
            });

            document.getElementById('sheetDownloadBtn').addEventListener('click', redirectToDownload);
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => player?.setVolume(e.target.value));
            
            progressBarContainer.addEventListener('mousedown', startScrub);
            progressBarContainer.addEventListener('touchstart', startScrub, { passive: false });
            miniProgressBarContainer.addEventListener('mousedown', startMiniScrub);
            miniProgressBarContainer.addEventListener('touchstart', startMiniScrub, { passive: false });

            window.addEventListener('mousemove', moveScrubGeneral);
            window.addEventListener('touchmove', moveScrubGeneral, { passive: false });
            window.addEventListener('mouseup', endScrubGeneral);
            window.addEventListener('touchend', endScrubGeneral);

            document.getElementById('apiConfigBtn').addEventListener('click', openApiModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeApiModal);
            document.getElementById('modalSaveBtn').addEventListener('click', saveSettingsFromModal);

            setupSwipeHandlers();
            checkAndApplyMarquee();
        });

        // ================= GESTIONE DEGLI SWIPE CON FEEDBACK VISIVO FLUIDO =================
        function setupSwipeHandlers() {
            let miniStartX = 0, miniCurrentX = 0, isDraggingMini = false;

            // Swipe sul MiniPlayer con trascinamento del testo in tempo reale
            miniPlayerContent.addEventListener('touchstart', (e) => {
                miniStartX = e.touches[0].clientX;
                isDraggingMini = true;
                miniPlayerTextContainer.style.transition = 'none';
            }, { passive: true });
            
            miniPlayerContent.addEventListener('touchmove', (e) => {
                if(!isDraggingMini) return;
                miniCurrentX = e.touches[0].clientX - miniStartX;
                // Sposta i testi seguendo il movimento del dito con un leggero smorzamento
                miniPlayerTextContainer.style.transform = `translate3d(${miniCurrentX * 0.7}px, 0, 0)`;
                miniPlayerTextContainer.style.opacity = Math.max(0.3, 1 - Math.abs(miniCurrentX) / 180);
            }, { passive: true });

            miniPlayerContent.addEventListener('touchend', (e) => {
                if(!isDraggingMini) return;
                isDraggingMini = false;
                miniPlayerTextContainer.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                
                if (miniCurrentX > 75) {
                    prevTrack();
                } else if (miniCurrentX < -75) {
                    nextTrack();
                }
                
                // Ritorno elastico al centro
                miniPlayerTextContainer.style.transform = 'translate3d(0, 0, 0)';
                miniPlayerTextContainer.style.opacity = '1';
                miniCurrentX = 0;
            }, { passive: true });

            // Gestione dei titoli sul Now Playing
            let titleStartX = 0, titleCurrentX = 0, isDraggingTitle = false;
            const startTitleDrag = (x) => {
                isDraggingTitle = true;
                titleStartX = x;
                swipeTitle.classList.add('dragging');
                marqueeContent.classList.remove('animate-marquee');
            };
            const moveTitleDrag = (x) => {
                if (!isDraggingTitle) return;
                titleCurrentX = x - titleStartX;
                const opacity = Math.max(0.2, 1 - Math.abs(titleCurrentX) / 350);
                swipeTitle.style.transform = `translate3d(${titleCurrentX}px, 0, 0)`;
                swipeTitle.style.opacity = opacity;
            };
            const endTitleDrag = () => {
                if (!isDraggingTitle) return;
                isDraggingTitle = false;
                swipeTitle.classList.remove('dragging');
                if (titleCurrentX > 75) animateOutAndChange('right');
                else if (titleCurrentX < -75) animateOutAndChange('left');
                else {
                    swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                    swipeTitle.style.opacity = '1';
                    checkAndApplyMarquee();
                }
                titleCurrentX = 0;
            };

            swipeTitle.addEventListener('touchstart', (e) => startTitleDrag(e.touches[0].clientX), { passive: true });
            swipeTitle.addEventListener('touchmove', (e) => { if(isDraggingTitle) { e.preventDefault(); moveTitleDrag(e.touches[0].clientX); } }, { passive: false });
            swipeTitle.addEventListener('touchend', endTitleDrag, { passive: true });
            swipeTitle.addEventListener('mousedown', (e) => startTitleDrag(e.clientX));
            window.addEventListener('mousemove', (e) => moveTitleDrag(e.clientX));
            window.addEventListener('mouseup', endTitleDrag);

            // Drag a scorrimento verticale per chiudere il Bottom Sheet
            let sheetStartY = 0, sheetCurrentY = 0, isDraggingSheet = false;
            const onSheetTouchStart = (e) => {
                if (e.target.closest('#progressBarContainer') || e.target.closest('#swipeTitleContainer') || e.target.closest('#miniPlayer')) return;
                sheetStartY = e.touches[0].clientY;
                isDraggingSheet = true;
                nowPlayingSheet.style.transition = 'none';
            };
            const onSheetTouchMove = (e) => {
                if (!isDraggingSheet) return;
                sheetCurrentY = e.touches[0].clientY - sheetStartY;
                if (sheetCurrentY > 0) {
                    nowPlayingSheet.style.transform = `translateY(calc(-100% + ${sheetCurrentY}px))`;
                }
            };
            const onSheetTouchEnd = () => {
                if (!isDraggingSheet) return;
                isDraggingSheet = false;
                nowPlayingSheet.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                if (sheetCurrentY > 150) {
                    nowPlayingSheet.classList.remove('expanded');
                }
                nowPlayingSheet.style.transform = '';
                sheetCurrentY = 0;
            };

            nowPlayingSheet.addEventListener('touchstart', onSheetTouchStart, { passive: true });
            nowPlayingSheet.addEventListener('touchmove', onSheetTouchMove, { passive: true });
            nowPlayingSheet.addEventListener('touchend', onSheetTouchEnd, { passive: true });
        }

        // ================= GESTIONE DELLO SCRUBBING =================
        let activeScrubType = null;

        function startScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            activeScrubType = 'large';
            progressBar.classList.add('scrubbing');
            updateScrubPositionGeneral(e);
        }

        function startMiniScrub(e) {
            if (!player?.getDuration || appState.currentIndex === -1) return;
            isScrubbing = true;
            activeScrubType = 'mini';
            updateScrubPositionGeneral(e);
        }

        function moveScrubGeneral(e) {
            if (!isScrubbing) return;
            if (e.cancelable) e.preventDefault();
            updateScrubPositionGeneral(e);
        }

        function updateScrubPositionGeneral(e) {
            const container = activeScrubType === 'large' ? progressBarContainer : miniProgressBarContainer;
            const rect = container.getBoundingClientRect();
            
            let clientX = 0;
            if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
            else if (e.changedTouches && e.changedTouches.length > 0) clientX = e.changedTouches[0].clientX;
            else clientX = e.clientX;

            let offsetX = clientX - rect.left;
            offsetX = Math.max(0, Math.min(offsetX, rect.width));
            scrubPercentage = offsetX / rect.width;

            const duration = player.getDuration() || 0;
            const targetTime = duration * scrubPercentage;

            progressBar.style.width = `${scrubPercentage * 100}%`;
            miniProgressBar.style.width = `${scrubPercentage * 100}%`;
            
            document.getElementById('currentTime').innerText = formatTime(targetTime);
            document.getElementById('miniCurrentTime').innerText = formatTime(targetTime);

            if (activeScrubType === 'large') {
                let relativeLeft = clientX - rect.left;
                relativeLeft = Math.max(0, Math.min(relativeLeft, rect.width));
                progressTooltip.innerText = formatTime(targetTime);
                progressTooltip.style.left = `${relativeLeft}px`;
                progressTooltip.classList.remove('hidden');
            }
        }

        function endScrubGeneral() {
            if (!isScrubbing) return;
            isScrubbing = false;
            progressBar.classList.remove('scrubbing');
            progressTooltip.classList.add('hidden');

            const duration = player.getDuration() || 0;
            player.seekTo(duration * scrubPercentage, true);
            activeScrubType = null;
        }

        // ================= DESIGN MENU DI SELEZIONE TEMI CUSTOM =================

        function populateCustomThemeSelect() {
            const trigger = document.getElementById('customSelectTrigger');
            const optionsContainer = document.getElementById('customSelectOptions');
            if (!trigger || !optionsContainer) return;

            optionsContainer.innerHTML = '';
            
            // Popola le opzioni custom
            for (const [key, theme] of Object.entries(themes)) {
                const opt = document.createElement('div');
                opt.className = "custom-select-option px-4 py-3 text-xs cursor-pointer text-white rounded-lg flex items-center justify-between transition-colors";
                opt.innerHTML = `
                    <span>${theme.name}</span>
                    <span class="w-3.5 h-3.5 rounded-full border border-white/20" style="background-color: ${theme.accent}"></span>
                `;
                opt.addEventListener('click', () => {
                    document.getElementById('customSelectValue').textContent = theme.name;
                    appState.currentTheme = key;
                    applyTheme(key);
                    optionsContainer.classList.add('hidden');
                });
                optionsContainer.appendChild(opt);
                
                if (key === appState.currentTheme) {
                    document.getElementById('customSelectValue').textContent = theme.name;
                }
            }

            // Toggle visibilità dropdown
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                optionsContainer.classList.toggle('hidden');
            });

            document.addEventListener('click', () => {
                optionsContainer.classList.add('hidden');
            });
        }

        function applyTheme(themeKey) {
            const theme = themes[themeKey] || themes.spotifyGreen;
            const root = document.documentElement;
            
            root.style.setProperty('--bg-main', theme.bgMain);
            root.style.setProperty('--bg-card', theme.bgCard);
            root.style.setProperty('--bg-input', theme.bgInput);
            root.style.setProperty('--accent', theme.accent);
            root.style.setProperty('--text-main', theme.textMain);
            root.style.setProperty('--text-muted', theme.textMuted);
            root.style.setProperty('--is-light', theme.isLight);

            document.getElementById('metaThemeColor')?.setAttribute('content', theme.bgMain);
            appState.currentTheme = themeKey;
            
            if (appState.currentIndex !== -1) renderTracklist();
        }

        function openApiModal() {
            const modal = document.getElementById('apiModal');
            const input = document.getElementById('modalApiKeyInput');
            if (modal && input) {
                input.value = appState.apiKey;
                modal.classList.remove('hidden');
            }
        }

        function closeApiModal() {
            const modal = document.getElementById('apiModal');
            if (modal) modal.classList.add('hidden');
        }

        function saveSettingsFromModal() {
            const key = document.getElementById('modalApiKeyInput').value.trim();
            const selectedTheme = appState.currentTheme;
            
            appState.apiKey = key;
            localStorage.setItem('youtubette_api_key', key);
            localStorage.setItem('youtubette_theme', selectedTheme);
            applyTheme(selectedTheme);

            const saveBtn = document.getElementById('modalSaveBtn');
            saveBtn.innerHTML = "Salvato! ✓";
            
            setTimeout(() => {
                saveBtn.innerHTML = "Salva";
                closeApiModal();
            }, 800);
        }

        async function redirectToDownload() {
            if (appState.currentIndex === -1) return;
            const currentTrack = appState.tracks[appState.currentIndex];
            if (!currentTrack || !currentTrack.id) return;
            
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrack.id}`;
            
            try {
                await navigator.clipboard.writeText(youtubeUrl);
                showToast("Link copiato!");
                setTimeout(() => {
                    window.open(`https://kleger.pl/`, '_blank');
                }, 800);
            } catch (err) {
                window.open(`https://kleger.pl/`, '_blank');
            }
        }

        function showToast(message) {
            const oldToast = document.getElementById('youtubette-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'youtubette-toast';
            toast.className = 'fixed bottom-28 left-1/2 transform -translate-x-1/2 border font-medium text-xs py-2.5 px-5 rounded-full shadow-2xl z-[150] transition-all duration-300 opacity-0 translate-y-2 custom-bg-card border-[var(--accent)] text-white';
            toast.innerHTML = `<i class="fa-solid fa-circle-check mr-2 custom-text-accent"></i> ${message}`;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 50);
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function toggleDownloadButtons(enabled) {
            const sheetDbtn = document.getElementById('sheetDownloadBtn');
            if (!sheetDbtn) return;
            if (enabled) {
                sheetDbtn.disabled = false;
                sheetDbtn.removeAttribute('disabled');
                sheetDbtn.classList.remove('opacity-30', 'cursor-not-allowed', 'text-neutral-400');
                sheetDbtn.classList.add('opacity-100', 'text-neutral-300', 'cursor-pointer');
            } else {
                sheetDbtn.disabled = true;
                sheetDbtn.setAttribute('disabled', 'true');
                sheetDbtn.classList.add('opacity-30', 'cursor-not-allowed', 'text-neutral-400');
                sheetDbtn.classList.remove('opacity-100', 'text-neutral-300');
            }
        }

        function animateOutAndChange(direction) {
            if (appState.tracks.length === 0) {
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
                return;
            }
            swipeTitle.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
            swipeTitle.style.transform = `translate3d(${direction === 'right' ? '100%' : '-100%'}, 0, 0)`;
            swipeTitle.style.opacity = '0';
            setTimeout(() => {
                if (direction === 'right') prevTrack(); else nextTrack();
                swipeTitle.style.transition = 'none';
                swipeTitle.style.transform = `translate3d(${direction === 'right' ? '-100%' : '100%'}, 0, 0)`;
                swipeTitle.offsetHeight;
                swipeTitle.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-out';
                swipeTitle.style.transform = 'translate3d(0, 0, 0)';
                swipeTitle.style.opacity = '1';
            }, 200);
        }

        function checkAndApplyMarquee() {
            const titleEl = document.getElementById('playerTrackTitle');
            const titleText = titleEl ? titleEl.innerText : 'YouTubette';
            
            marqueeContent.classList.remove('animate-marquee');
            const wrapper = swipeTitle.querySelector('.marquee-wrapper');
            let cleanText = `<span id="playerTrackTitle" class="text-lg md:text-xl font-black text-white">${titleText}</span>`;
            
            marqueeContent.innerHTML = cleanText;
            if (wrapper && marqueeContent.scrollWidth > wrapper.clientWidth) {
                marqueeContent.innerHTML += "<span class='inline-block w-16'></span>" + cleanText;
                marqueeContent.classList.add('animate-marquee');
            }
        }

        async function performSearch(isLoadMore = false) {
            const query = searchInput.value.trim();
            if (!query || (isLoadMore && isFetchingMore)) return;
            if (!appState.apiKey) { openApiModal(); return; }

            const placeholderText = document.getElementById('placeholderText');
            if (!isLoadMore) {
                if (placeholderText) placeholderText.innerText = "Ricerca in corso...";
                appState.tracks = []; appState.currentIndex = -1; nextSearchPageToken = '';
                toggleDownloadButtons(false);
            } else isFetchingMore = true;

            const order = document.getElementById('filterOrder').value;

            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&order=${order}&key=${appState.apiKey}`;
                if (nextSearchPageToken) url += `&pageToken=${nextSearchPageToken}`;

                const response = await fetch(url);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                nextSearchPageToken = data.nextPageToken || '';
                let newTracks = data.items.map(item => ({
                    id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle, thumbnail: item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.default.url
                }));

                appState.tracks = appState.tracks.concat(newTracks);
                renderTracklist();
            } catch (error) {
                alert(error.message);
                if (placeholderText && !isLoadMore) placeholderText.innerText = "";
            } finally { if (isLoadMore) isFetchingMore = false; }
        }

        function renderTracklist() {
            const trackListDiv = document.getElementById('trackList');
            if (!trackListDiv) return; trackListDiv.innerHTML = '';
            
            if (appState.tracks.length === 0) {
                trackListDiv.innerHTML = '<p class="text-xs p-2 italic text-center custom-text-muted">Nessun risultato.</p>';
                return;
            }

            document.getElementById('trackCount').innerText = `${appState.tracks.length} brani`;

            appState.tracks.forEach((track, index) => {
                const trackRow = document.createElement('div');
                trackRow.id = `track-row-${index}`;
                trackRow.className = `flex items-center p-2.5 rounded-2xl cursor-pointer transition-all hover:bg-white/5 active:bg-white/10 ${appState.currentIndex === index ? 'bg-white/10' : ''}`;
               
                // Copertine della tracklist principale ora tonde
                trackRow.innerHTML = `
                    <div class="w-6 text-center text-xs custom-text-muted font-bold">${index + 1}</div>
                    <img src="${track.thumbnail}" class="w-11 h-11 object-cover rounded-full mx-2.5 shadow-md shrink-0">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-bold truncate ${appState.currentIndex === index ? 'custom-text-accent font-black' : 'text-white'}">${track.title}</p>
                        <p class="text-[10px] truncate mt-0.5 custom-text-muted font-medium">${track.channel}</p>
                    </div>
                `;
                trackRow.addEventListener('click', () => {
                    loadTrack(index);
                    if (index === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
                });
                trackListDiv.appendChild(trackRow);
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= appState.tracks.length) return;
            
            if (appState.currentIndex !== -1) {
                const oldRow = document.getElementById(`track-row-${appState.currentIndex}`);
                if (oldRow) {
                    oldRow.classList.remove('bg-white/10');
                    const oldText = oldRow.querySelector('p.text-xs');
                    if (oldText) { oldText.classList.remove('custom-text-accent', 'font-black'); oldText.classList.add('text-white'); }
                }
            }

            appState.currentIndex = index;
            const track = appState.tracks[index];

            const titleEl = document.getElementById('playerTrackTitle');
            const channelEl = document.getElementById('playerTrackChannel');
            if (titleEl) titleEl.innerText = track.title;
            if (channelEl) channelEl.innerText = track.channel;
            
            // Imposta lo sfondo sfocato immersivo a tutto schermo nel Now Playing
            if (nowPlayingArtworkBg) {
                nowPlayingArtworkBg.style.backgroundImage = `url(${track.thumbnail})`;
            }
            
            if (globalAmbientBg) globalAmbientBg.style.backgroundImage = `url(${track.thumbnail})`;

            miniPlayer.classList.remove('hidden');
            document.getElementById('miniPlayerImg').src = track.thumbnail;
            document.getElementById('miniPlayerTitle').innerText = track.title;
            document.getElementById('miniPlayerChannel').innerText = track.channel;

            const newRow = document.getElementById(`track-row-${index}`);
            if (newRow) {
                newRow.classList.add('bg-white/10');
                const newText = newRow.querySelector('p.text-xs');
                if (newText) { newText.classList.remove('text-white'); newText.classList.add('custom-text-accent', 'font-black'); }
                newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (player?.loadVideoById) player.loadVideoById(track.id);
            checkAndApplyMarquee();
            updateMediaSessionMetadata(track);
            toggleDownloadButtons(true);
        }

        function updateMediaSessionMetadata(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title, artist: track.channel, album: 'YouTubette Beats',
                    artwork: [{ src: track.thumbnail, sizes: '120x120', type: 'image/jpeg' }]
                });
            }
        }

        function updateMediaSessionState(isPlaying) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
        }

        function setupMediaSessionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        function togglePlay() {
            if (!player || appState.currentIndex === -1) return;
            if (appState.isPlaying) player.pauseVideo(); else player.playVideo();
        }

        function nextTrack() {
            if (appState.tracks.length === 0) return;
            let nextIdx = appState.currentIndex + 1;
            if (nextIdx >= appState.tracks.length) {
                if (nextSearchPageToken) {
                    performSearch(true).then(() => { if (appState.tracks[nextIdx]) loadTrack(nextIdx); });
                } else loadTrack(0);
            } else {
                loadTrack(nextIdx);
                if (nextIdx === appState.tracks.length - 1 && nextSearchPageToken) performSearch(true);
            }
        }

        function prevTrack() {
            if (appState.tracks.length === 0) return;
            let prevIdx = appState.currentIndex - 1;
            if (prevIdx < 0) prevIdx = appState.tracks.length - 1;
            loadTrack(prevIdx);
        }

        function startProgressLoop() {
            setInterval(() => {
                if (player?.getCurrentTime && appState.isPlaying && !isScrubbing) {
                    const currentTime = player.getCurrentTime(), duration = player.getDuration();
                    if (duration > 0) {
                        const progressPercent = (currentTime / duration) * 100;
                        progressBar.style.width = `${progressPercent}%`;
                        miniProgressBar.style.width = `${progressPercent}%`;
                        document.getElementById('currentTime').innerText = formatTime(currentTime);
                        document.getElementById('miniCurrentTime').innerText = formatTime(currentTime);
                    }
                }
            }, 500);
        }

        function updateDuration() {
            if (player?.getDuration) {
                const totalDuration = player.getDuration();
                document.getElementById('durationTime').innerText = formatTime(totalDuration);
                document.getElementById('miniDurationTime').innerText = formatTime(totalDuration);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
